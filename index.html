                rulerRef.current.current = {x, y};
            };
            const handleMouseUp = () => {
                if (sculptActive) {
                    rulerRef.current.isSculpting = false;
                    rulerRef.current.mouse = null;
                }
            };

            const handleShowCorrelation = () => {
                if (showCorrelation) {
                    setShowCorrelation(false);
                } else {
                    setShowCorrelation(true);
                    setShowVoidProfile(false);
                    setShowDensityPDF(false);
                }
            };

            const handleShowVoidProfile = () => {
                if (showVoidProfile) {
                    setShowVoidProfile(false);
                } else {
                    setShowVoidProfile(true);
                    setShowCorrelation(false);
                    setShowDensityPDF(false);
                }
            };

            const handleShowDensityPDF = () => {
                if (showDensityPDF) {
                    setShowDensityPDF(false);
                } else {
                    setShowDensityPDF(true);
                    setShowCorrelation(false);
                    setShowVoidProfile(false);
                }
            };

            useEffect(() => {
                const handleResize = () => {
                    if (isRecordingRef.current) return; // Don't resize during recording
                    setCanvasSize({ w: window.innerWidth - SIDEBAR_W, h: window.innerHeight });
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Handle deferred recording start after canvas resize (720p/1080p)
            useEffect(() => {
                if (!pendingRecRef.current) return;
                const info = pendingRecRef.current;
                pendingRecRef.current = null;
                // Canvas resized, ICs regenerated — start recording from z=10
                const minT = cosmologyLUT.minTime;
                simulationTimeRef.current = minT;
                setCosmicTime(minT);
                resetPhysics();
                if (splitScreen) resetPhysicsB();
                setTimeout(() => {
                    actualStartRecording(minT, info.speedLabel, info.gasLabel || '');
                }, 300);
            }, [canvasSize]);

            useEffect(() => {
                let animationFrameId;
                let frameCount = 0;
                let cancelled = false;

                const render = async () => {
                    if (cancelled) return;
                    // Expose render function so recording loop can schedule individual frames
                    recRenderFnRef.current = render;

                    // Guard: at least Panel A must be ready
                    if (!uiCanvasRef.current || !webglCanvasRef.current || !glRef.current || !programRef.current) {
                        if (!cancelled) animationFrameId = requestAnimationFrame(render);
                        return;
                    }

                    if (isPlaying && !isRecordingRef.current) {
                        let next = simulationTimeRef.current + simDeltaT;
                        if (next >= 1.0) {
                            next = 1.0;
                            setCosmicTime(1.0);
                            setIsPlaying(false);
                        } else {
                            simulationTimeRef.current = next;
                            if (frameCount % 3 === 0) setCosmicTime(next);
                        }
                    }
                    frameCount++;

                    // --- Determine panel count ---
                    const panelCount = splitScreen ? 2 : 1;

                    // Compute reference redshift from Panel A for synchronization
                    const { z: refZ } = getValuesAtTime(simulationTimeRef.current, cosmologyLUT);

                    // --- Process each panel ---
                    for (let panelIdx = 0; panelIdx < panelCount; panelIdx++) {
                    const isB = panelIdx === 1;

                    // Select rendering contexts for this panel (shadow outer vars)
                    const canvas = isB ? uiCanvasRefB.current : uiCanvasRef.current;
                    const glCanvas = isB ? webglCanvasRefB.current : webglCanvasRef.current;
                    const gl = isB ? glRefB.current : glRef.current;
                    const program = isB ? programRefB.current : programRef.current;
                    const panelBuffers = isB ? buffersRefB.current : buffersRef.current;
                    const panelWebglData = isB ? webglDataRefB.current : webglDataRef.current;

                    if (!canvas || !glCanvas || !gl || !program || !panelBuffers || !panelBuffers.position) continue;

                    const ctx = canvas.getContext('2d');
                    const cWidth = canvas.width;
                    const cHeight = canvas.height;

                    // Select cosmology for this panel
                    const pOm = isB ? omegaMB : omegaM;
                    const pOl = isB ? omegaLB : omegaL;
                    const pW0 = isB ? w0B : w0;
                    const pWa = isB ? waB : wa;
                    const pLUT = isB ? (cosmologyLUTB || cosmologyLUT) : cosmologyLUT;

                    // Select physics state for this panel
                    const pLD = isB ? localDynamicsB.current : localDynamics.current;
                    const pPosRef = isB ? posRefB : posRef;
                    const pHeadRef = isB ? headRefB : headRef;
                    const pNextRef = isB ? nextRefB : nextRef;
                    const pTrailHistory = isB ? trailHistoryB.current : trailHistory.current;
                    const pVoronoiDataRef = isB ? voronoiDataRefB : voronoiDataRef;
                    const pWorkerRef = isB ? workerRefB : workerRef;
                    const pIsWorkerBusy = isB ? isWorkerBusyB : isWorkerBusy;
                    const pLastCalcParamsRef = isB ? lastCalcParamsRefB : lastCalcParamsRef;
                    const pTracerForces = isB ? tracerForcesB : tracerForces;
                    const pTracerForces2 = isB ? tracerForces2B : tracerForces2;
                    const pBaoRadiusPx = isB ? BAO_RADIUS_PX_B : BAO_RADIUS_PX;
                    const pBaoRadiusMpc = isB ? BAO_RADIUS_MPC_B : BAO_RADIUS_MPC;
                    const pCosmoMode = isB ? cosmoModeB : cosmoMode;

                    // Synchronized redshift: Panel B uses Panel A's z, mapped through its own LUT
                    let currentZ, growthD;
                    if (isB && splitScreen) {
                        const result = getValuesAtRedshift(refZ, pLUT);
                        currentZ = result.z;
                        growthD = result.D;
                    } else {
                        const result = getValuesAtTime(simulationTimeRef.current, pLUT);
                        currentZ = result.z;
                        growthD = result.D;
                    }

                    // P(k) mode: use linear growth factor D(t) directly (no gamma boost).
                    // The E&H transfer function + Abel projection now produce
                    // well-calibrated 2D displacements at all FoV scales.

                    // Both P(k) and hybrid-BAO modes now produce displacements
                    // in the same physical-pixel convention → rawScale = 1/120 always.
                    const rawScale = RAW_SCALE_UNIFIED;
                    const densityFactor = Math.pow(pOm / 0.3, 0.6);
                    const dispScale = growthD * DISP_SCALE_FACTOR * Math.min(1.0, rawScale) * densityFactor;
                    // 2LPT: D_2(t) ~ -3/7 * D_1(t)^2  (Einstein-de Sitter approx.)
                    const disp2Scale = (-3 / 7) * growthD * dispScale;

                    const virialScale = 0.2 * growthD;
                    const expansionRate = getHubbleFactor(currentZ, pOm, pOl, pW0, pWa);
                    // Hubble drag: comoving EOM has friction term 2*H(z)*v
                    // Physically: v *= exp(-2 * E(z) * ageZero * simDeltaT)
                    // ageZero = H0*t0 maps normalized sim-time to Hubble units
                    // The BASE constant is empirically calibrated above the
                    // pure physical value to account for unresolved sub-grid
                    // velocity dispersion damping (physical drag alone is too weak
                    // for the ~500 time steps spanning z=10 to z=0 in our sim).
                    // Cosmology scaling: ageZero varies ~30% (EdS 0.667 → LCDM 0.964)
                    const ageZero = pLUT.ageZero || REFERENCE_AGE_ZERO;
                    // Disable Hubble drag in sculpt mode: pure gravity + softening only
                    const isSculpting = !isB && sculptActive && simulationTimeRef.current >= 0.99;
                    const hubbleDrag = isSculpting ? 1.0 : Math.exp(-2.0 * expansionRate * HUBBLE_DRAG_BASE * (ageZero / REFERENCE_AGE_ZERO) * simDeltaT / REFERENCE_DT);

                    let physX, physY;

                    if (pLD.initialized) {
                        const { offsets, velocities, gravityForces, prevGravForces, densities, smoothedDensities, crossingAccum } = pLD;
                        const N = tracersPerPanel;

                        const gpuGravity = gpuGravityRef.current;
                        const willUseGPU = useGPU && gpuGravity && gpuGravity.available;
                        // Density coloring always uses 3x3 (9 cells) for consistency in density between CPU & GPU
                        const gp = computeGridParams(N, SIM_W, SIM_H, 9);
                        const { cellSize, gridW, gridH, gridSize, meanDensity, densityThreshold } = gp;

                        if (pHeadRef.current.length !== gridSize) pHeadRef.current = new Int32Array(gridSize);
                        if (pNextRef.current.length !== N) pNextRef.current = new Int32Array(N);

                        const head = pHeadRef.current;
                        const next = pNextRef.current;

                        physX = pPosRef.current.x;
                        physY = pPosRef.current.y;

                        const doPhysics = (isPlaying || isRecordingRef.current) && enableLocalGravity;

                        // ============================================================
                        // LEAPFROG KDK (Kick-Drift-Kick) integration
                        // Step 1: Half-kick with PREVIOUS step's gravity forces
                        // Step 2: Drift (integrate velocities into offsets)
                        // Step 3: Update positions + build grid
                        // Step 4: Compute gravity at new positions -> new forces
                        // Step 5: Half-kick with NEW forces
                        // ============================================================

                        // STEP 1: HALF-KICK (previous forces)
                        if (doPhysics) {
                            applyHalfKick(velocities, gravityForces, N);
                        }

                        // STEP 2: DRIFT (drag + clamp + offset update)
                        if (doPhysics) {
                            integrateVelocities(velocities, offsets, hubbleDrag, N);
                            pVoronoiDataRef.current = null;
                        }

                        // SCULPTING LOGIC (Panel A only)
                        if (!isB && sculptActive && rulerRef.current.isSculpting && rulerRef.current.mouse && simulationTimeRef.current >= 0.99) {
                            applySculpting(
                                rulerRef.current.mouse.x, rulerRef.current.mouse.y, 150,
                                N, initialTracers, pTracerForces, pTracerForces2, offsets, dispScale, disp2Scale, SIM_W, SIM_H
                            );
                            pVoronoiDataRef.current = null;
                        }

                        // STEP 3: UPDATE POSITIONS + BUILD GRID
                        updatePositionsAndBuildGrid(
                            N, initialTracers, pTracerForces, pTracerForces2, offsets, crossingAccum,
                            dispScale, growthD, rawScale, densityFactor,
                            SIM_W, SIM_H, physX, physY, cellSize, gridW, gridH, head, next,
                            useAdhesion
                        );

                        // RECORD TRAILS
                        if ((isPlaying || isRecordingRef.current) && (Date.now() % 50 < 20) && trailPercentage > 0) {
                            recordTrails(N, initialTracers, physX, physY, virialScale, pTrailHistory, trailPercentage, SIM_W, SIM_H);
                        }

                        // STEP 4: COMPUTE GRAVITY -> new forces
                        // G_eff = G_base * f(a) * (dt/dt_ref) * (N_ref/N)
                        //   f(a) = Omega_m(a)^0.55: growth-rate scaling (Linder 2005, Cosmic Growth History and Expansion History: https://arxiv.org/pdf/astro-ph/0507263)
                        //          encodes both matter density and dark energy suppression
                        //          in a single physically-motivated factor
                        //   dt scaling:  keeps total impulse constant across timestep choices
                        //   N scaling:   mimics m = M_total/N (mass per tracer)
                        const a_current = 1.0 / (1.0 + currentZ);
                        const OmA = pOm * Math.pow(a_current, -3) / (expansionRate * expansionRate);
                        const gravScale = Math.pow(OmA, 0.55);
                        const effectiveGravity = GRAVITY_BASE_STRENGTH
                            * gravScale
                            * (simDeltaT / REFERENCE_DT)
                            * (REFERENCE_TRACER_COUNT / N);
                        let usedGPU = false;
                        if (willUseGPU) {
                            try {
                                const isSyncMode = isRecordingRef.current || splitScreen;
                                const gpuSearchRadius = 4;
                                const gpuResult = await gpuGravity.compute(
                                    physX, physY, pTracerForces, N,
                                    {
                                        simW: SIM_W, simH: SIM_H,
                                        cellSize, gridW, gridH,
                                        effectiveGravity,
                                        doPhysics,
                                        searchRadius: gpuSearchRadius,
                                        maxDistSq: cellSize * cellSize * (gpuSearchRadius * gpuSearchRadius),
                                        softeningLengthSq: SOFTENING_LENGTH_SQ,
                                        shellCrossingRadiusSq: SHELL_CROSSING_RADIUS_SQ
                                    },
                                    isSyncMode
                                );
                                if (cancelled) return;
                                if (gpuResult) {
                                    processGPUGravityResult(gpuResult, N, densities, crossingAccum, gravityForces, densityThreshold, doPhysics, simDeltaT / REFERENCE_DT);
                                    usedGPU = true;
                                }
                            } catch (e) {
                                // GPU error -- fall through to CPU
                            }
                        }

                        // CPU fallback
                        if (!usedGPU) {
                            computeCPUGravity(
                                N, physX, physY, head, next, pTracerForces,
                                gridW, gridH, cellSize, SIM_W, SIM_H,
                                densities, crossingAccum, gravityForces,
                                densityThreshold, effectiveGravity, doPhysics, simDeltaT / REFERENCE_DT
                            );
                        }

                        // TEMPORAL SMOOTHING (density)
                        smoothDensities(densities, smoothedDensities, N, isPlaying || isRecordingRef.current);

                        // FORCE TEMPORAL SMOOTHING: average with previous step
                        if (doPhysics) {
                            smoothForces(gravityForces, prevGravForces, N);
                        }

                        // STEP 5: HALF-KICK (new forces)
                        if (doPhysics) {
                            applyHalfKick(velocities, gravityForces, N);
                        }
                    }

                    // --- DRAWING: Clear this panel's canvases ---
                    gl.viewport(0, 0, cWidth, cHeight);
                    gl.clearColor(0, 0, 0, 1);
                    gl.clear(gl.COLOR_BUFFER_BIT);
                    ctx.clearRect(0, 0, cWidth, cHeight);

                    let pSmoothedDensities = null;
                    let pMeanDensity = 0;

                    if (showTracers && physX) {
                        const { densities, smoothedDensities, crossingAccum: pCrossing, thermalPhases: pThermalPhases } = pLD;
                        pSmoothedDensities = smoothedDensities;
                        const N = tracersPerPanel;

                        // Update resolution uniform for this panel's coordinate system
                        const resLoc = gl.getUniformLocation(program, "u_resolution");
                        gl.uniform2f(resLoc, SIM_W, SIM_H);

                        // Density coloring always uses 3x3 (9 cells) for consistency
                        const gridSide = Math.floor(Math.sqrt(N));
                        const safeGridSide = Math.min(2000, Math.max(10, gridSide));
                        const maxDim = Math.max(SIM_W, SIM_H);
                        const cellSize = Math.max(2, maxDim / safeGridSide);
                        const gridW = Math.ceil(SIM_W / cellSize);
                        const gridH = Math.ceil(SIM_H / cellSize);
                        const meanDensity = (tracersPerPanel / (gridW * gridH)) * 9;
                        pMeanDensity = meanDensity;

                        const simW = SIM_W | 0;
                        const simH = SIM_H | 0;
                        const area = cWidth * cHeight;
                        const avgSeparation = Math.sqrt(area / N);
                        const dynamicBaseSize = avgSeparation * 0.8 * 1.0;

                        const wbColors = panelWebglData.colors;
                        const wbSizes = panelWebglData.sizes;
                        const wbPositions = panelWebglData.positions;

                        // --- Thermal scatter: physically-modulated display-time offset ---
                        // Advance persistent phases and compute per-particle offsets
                        // Disabled in sculpt mode for clean gravity-only dynamics
                        const isSculptingNow = !isB && sculptActive && simulationTimeRef.current >= 0.99;
                        if (!isSculptingNow) {
                            const thermalGrowthRate = Math.pow(
                                pOm * Math.pow(1.0 + currentZ, 3) / Math.max(1e-6, expansionRate * expansionRate), 0.55
                            );
                            const thermalDt = (isPlaying || isRecordingRef.current) ? simDeltaT : 0;
                            computeThermalScatter(
                                N, pThermalPhases, smoothedDensities, pCrossing, pTracerForces,
                                virialScale, thermalGrowthRate, thermalDt, meanDensity
                            );
                        } else {
                            // Zero out thermal offsets so particles show true positions
                            for (let i = 0; i < N; i++) {
                                pThermalPhases[N + i * 2] = 0;
                                pThermalPhases[N + i * 2 + 1] = 0;
                            }
                        }

                        // FILL BUFFERS
                        for (let i = 0; i < N; i++) {
                            const coldPx = physX[i];
                            const coldPy = physY[i];
                            // Read pre-computed thermal offset from phase array (packed after phases)
                            const thermalX = pThermalPhases[N + i * 2];
                            const thermalY = pThermalPhases[N + i * 2 + 1];
                            let px = ((coldPx + thermalX) % simW + simW) % simW;
                            let py = ((coldPy + thermalY) % simH + simH) % simH;

                            wbPositions[i*2] = px;
                            wbPositions[i*2+1] = py;

                            if (showGas) {
                                const density = smoothedDensities[i] || 1;
                                const ratio = density / (meanDensity || 1);

                                let colIdx = (Math.pow(ratio, 0.75) * 100) | 0;
                                if (colIdx >= COLOR_LUT_SIZE) colIdx = COLOR_LUT_SIZE - 1;

                                // Color (Gas LUT)
                                wbColors[i*4] = GAS_LUT_RGB[colIdx*3];     // R
                                wbColors[i*4+1] = GAS_LUT_RGB[colIdx*3+1]; // G
                                wbColors[i*4+2] = GAS_LUT_RGB[colIdx*3+2]; // B

                                // Opacity logic moved to shader/blend, but we can pass alpha
                                const opacity = Math.min(0.8, 0.15 / (ratio + 0.1) + (ratio * 0.1));
                                wbColors[i*4+3] = opacity;

                                // Size
                                wbSizes[i] = Math.max(0.5, dynamicBaseSize / Math.pow(ratio + 0.5, 0.6)) * 4.0; // Scale up for visual match
                            } else {
                                const density = densities[i] || 1;
                                const ratio = density / (meanDensity || 1);
                                let colIdx = (Math.pow(ratio, 0.75) * 100) | 0;
                                if (colIdx >= COLOR_LUT_SIZE) colIdx = COLOR_LUT_SIZE - 1;

                                wbColors[i*4] = DENSITY_LUT_RGB[colIdx*3];
                                wbColors[i*4+1] = DENSITY_LUT_RGB[colIdx*3+1];
                                wbColors[i*4+2] = DENSITY_LUT_RGB[colIdx*3+2];
                                wbColors[i*4+3] = 1.0;
                                wbSizes[i] = 1.0;
                            }
                        }

                        // UPLOAD TO GPU
                        // Positions
                        gl.bindBuffer(gl.ARRAY_BUFFER, panelBuffers.position);
                        gl.bufferData(gl.ARRAY_BUFFER, wbPositions, gl.DYNAMIC_DRAW);
                        const posLoc = gl.getAttribLocation(program, "a_position");
                        gl.enableVertexAttribArray(posLoc);
                        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

                        // Colors
                        gl.bindBuffer(gl.ARRAY_BUFFER, panelBuffers.color);
                        gl.bufferData(gl.ARRAY_BUFFER, wbColors, gl.DYNAMIC_DRAW);
                        const colLoc = gl.getAttribLocation(program, "a_color");
                        gl.enableVertexAttribArray(colLoc);
                        gl.vertexAttribPointer(colLoc, 4, gl.FLOAT, false, 0, 0);

                        // Sizes
                        gl.bindBuffer(gl.ARRAY_BUFFER, panelBuffers.size);
                        gl.bufferData(gl.ARRAY_BUFFER, wbSizes, gl.DYNAMIC_DRAW);
                        const sizeLoc = gl.getAttribLocation(program, "a_size");
                        gl.enableVertexAttribArray(sizeLoc);
                        gl.vertexAttribPointer(sizeLoc, 1, gl.FLOAT, false, 0, 0);

                        // Uniforms
                        const isGasLoc = gl.getUniformLocation(program, "u_is_gas");
                        gl.uniform1i(isGasLoc, showGas ? 1 : 0);

                        // DRAW PASS 1
                        if (showGas) {
                            gl.enable(gl.BLEND);
                            gl.blendFunc(gl.SRC_ALPHA, gl.ONE); // Screen/Additive-ish blend
                        } else {
                            gl.disable(gl.BLEND);
                        }

                        gl.drawArrays(gl.POINTS, 0, N);

                    }


                    // --- DRAWING: UI LAYER (Layer 1 - Canvas 2D) ---
                    ctx.save(); // for composite ops

                    // --- VORONOI / VOID RENDERING (VIA WORKER) ---
                    if ((showVoronoi || showVoids) && physX && !isPlaying) {
                        const paramsChanged = (
                            pLastCalcParamsRef.current.minVoidRadius !== minVoidRadius ||
                            pLastCalcParamsRef.current.voidThreshold !== voidThreshold
                        );

                        if ((!pVoronoiDataRef.current || paramsChanged) && !pIsWorkerBusy.current && pWorkerRef.current) {
                            pIsWorkerBusy.current = true;
                            pLastCalcParamsRef.current = { minVoidRadius, voidThreshold };

                            const minVoidRadiusPx = minVoidRadius * pxPerMpc;

                            pWorkerRef.current.postMessage({
                                physX: physX,
                                physY: physY,
                                N: tracersPerPanel,
                                width: SIM_W,
                                height: SIM_H,
                                showVoids: showVoids,
                                voidThreshold: voidThreshold,
                                minVoidRadiusPx: minVoidRadiusPx
                            });
                        }

                        const data = pVoronoiDataRef.current;
                        if (data) {
                            drawVoidOverlay(ctx, data, {
                                tracersPerPanel, physX, physY, voidThreshold,
                                showVoronoi, showVoids, SIM_W, SIM_H, voidCenterMode
                            });
                        }
                    } else {
                        if (isPlaying || (!showVoronoi && !showVoids)) {
                            pVoronoiDataRef.current = null;
                        }
                    }

                    if (showDensity && initMode === 'bao') {
                        drawDensityField(ctx, centers, pBaoRadiusPx, growthD, numCircles, SIM_W, SIM_H);
                    }

                    drawTrails(ctx, {
                        physX, physY, initialTracers, tracerForces: pTracerForces,
                        tracerForces2: pTracerForces2,
                        trailHistory: pTrailHistory, velocities: pLD.velocities,
                        tracersPerPanel, trailPercentage, trailMode,
                        SIM_W, SIM_H, virialScale, isPlaying, enableLocalGravity,
                        rawScale, densityFactor, dispScale, disp2Scale
                    });
                    ctx.restore();

                    if (showInitialOverlay) {
                        // Compute start-time displacement scales using the same formula
                        // as updatePositionsAndBuildGrid, evaluated at z=10 (LUT minTime).
                        const startResult = getValuesAtTime(pLUT.minTime, pLUT);
                        const startD1 = startResult.D;
                        const startDispScale2 = startD1 * DISP_SCALE_FACTOR * Math.min(1.0, rawScale) * densityFactor;
                        const startDisp2Scale2 = (-3 / 7) * startD1 * startDispScale2;
                        drawInitialOverlay(ctx, initialTracers, pTracerForces, pTracerForces2,
                            tracersPerPanel, SIM_W, SIM_H, startDispScale2, startDisp2Scale2);
                    }

                    if (rulerActive && rulerRef.current.start && rulerRef.current.current) {
                        drawRuler(ctx, rulerRef.current.start, rulerRef.current.current, pxPerMpc);
                    }

                    // --- STATS CHART (Correlation or Void Profile) ---
                    let corrCenters = centers;


                    // GPU correlation: fire-and-forget compute; use previous frame's result for drawing.
                    // We never await inside the render loop to keep chart drawing synchronous.
                    // Skip GPU pair-counting in P(k) mode — power spectrum uses FFT instead.
                    // Per-panel GPU correlation refs
                    const pGpuCorrResult = isB ? gpuCorrResultRefB : gpuCorrResultRef;
                    const pGpuCorrInFlight = isB ? gpuCorrInFlightRefB : gpuCorrInFlightRef;

                    if (showCorrelation && initMode !== 'pk' && physX && useGPU && gpuCorrelationRef.current && gpuCorrelationRef.current.available && !pGpuCorrInFlight.current) {
                        const corrBinSize = 8;
                        const corrMaxDist = pBaoRadiusPx * 1.7;
                        const corrNumBins = Math.ceil(corrMaxDist / corrBinSize);
                        pGpuCorrInFlight.current = true;
                        gpuCorrelationRef.current.compute(
                            physX, physY, tracersPerPanel, corrCenters,
                            corrBinSize, corrNumBins, corrMaxDist, SIM_W, SIM_H,
                            false  // always use explicit center list
                        ).then(result => {
                            pGpuCorrResult.current = result;
                            pGpuCorrInFlight.current = false;
                        }).catch(() => {
                            pGpuCorrInFlight.current = false;
                        });
                    }
                    drawStatsChart(ctx, {
                        showCorrelation, showVoidProfile, showDensityPDF, physX, physY, tracersPerPanel,
                        centers: corrCenters, pBaoRadiusPx, pBaoRadiusMpc, pxPerMpc, SIM_W, SIM_H,
                        voronoiData: pVoronoiDataRef.current, voidCenterMode, profileMode,
                        gpuCorrHistogram: (showCorrelation && useGPU) ? pGpuCorrResult.current : null,
                        gpuCorrNCenters: corrCenters ? corrCenters.length : 0,
                        initMode, panelBoxMpc, panelId: panelIdx,
                        smoothedDensities: pSmoothedDensities, meanDensity: pMeanDensity
                    });

                    if (showVoids && pVoronoiDataRef.current && pVoronoiDataRef.current.voidResults) {
                        drawVoidStats(ctx, pVoronoiDataRef.current.voidResults, voidThreshold, minVoidRadius, pxPerMpc, SIM_W, SIM_H);
                    }

                    drawScaleBar(ctx, pxPerMpc, SIM_H, isSidebarCollapsed, isB);

                    // --- Draw panel info box at divider edge, vertically centered ---
                    if (splitScreen) {
                        drawPanelInfoBox(ctx, {
                            currentZ, pOm, pOl, pW0, pWa, pCosmoMode,
                            pBaoRadiusMpc, isB, cWidth, cHeight
                        });
                    }
                    } // end panel loop

                    // During recording, the render loop does NOT self-schedule.
                    // The recording loop calls render() directly for each frame.
                    if (isRecordingRef.current) return;

                    if (!cancelled) animationFrameId = requestAnimationFrame(render);
                };

                render();
                return () => {
                    cancelled = true;
                    cancelAnimationFrame(animationFrameId);
                };
            }, [isPlaying, simDeltaT, omegaM, omegaL, w0, wa, showTracers, showGas, showDensity, showInitialOverlay, rulerActive, sculptActive, trailPercentage, trailMode, initialTracers, centers, tracerForces, tracerForcesB, tracerForces2, tracerForces2B, canvasSize, enableLocalGravity, numCircles, boxSizeMpc, BAO_RADIUS_MPC, BAO_RADIUS_MPC_B, BAO_RADIUS_PX_B, tracersPerPanel, isSidebarCollapsed, renderTrigger, cosmologyLUT, showCorrelation, showVoidProfile, showDensityPDF, showVoronoi, showVoids, voidThreshold, minVoidRadius, voidCenterMode, profileMode, splitScreen, omegaMB, omegaLB, w0B, waB, cosmologyLUTB, cosmoMode, cosmoModeB, initMode]);

            return (
                <div id="app-container" className={`${rulerActive ? 'cursor-crosshair' : ''} ${sculptActive ? 'cursor-grab' : ''}`}
                     onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp}>

                    {/* --- Canvas panels --- */}
                    <div style={{ position: 'absolute', top: 0, left: SIDEBAR_W, width: canvasSize.w, height: canvasSize.h, display: 'flex', flexDirection: 'row' }}>
                        {/* Panel A */}
                        <div style={{ position: 'relative', width: splitScreen ? panelW : canvasSize.w, height: canvasSize.h, flexShrink: 0 }}>
                            <canvas ref={webglCanvasRef} width={SIM_W} height={SIM_H} style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}/>
                            <canvas ref={uiCanvasRef} width={SIM_W} height={SIM_H} style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none' }}/>
                        </div>
                        {/* Divider */}
                        {splitScreen && (
                            <div style={{ width: DIVIDER_WIDTH, height: canvasSize.h, background: 'rgba(255,255,255,0.35)', flexShrink: 0 }}/>
                        )}
                        {/* Panel B */}
                        {splitScreen && (
                            <div style={{ position: 'relative', width: panelW, height: canvasSize.h, flexShrink: 0 }}>
                                <canvas ref={webglCanvasRefB} width={SIM_W} height={SIM_H} style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}/>
                                <canvas ref={uiCanvasRefB} width={SIM_W} height={SIM_H} style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none' }}/>
                            </div>
                        )}
                    </div>

                    {/* Recording overlay — transparent, shows simulation evolving */}
                    {isRecording && (
                        <div style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', zIndex: 40, pointerEvents: 'none' }}>
                            {/* REC indicator — top-left, offset from sidebar */}
                            <div style={{ position: 'absolute', top: 20, left: isSidebarCollapsed ? 80 : 410, display: 'flex', alignItems: 'center', gap: '8px' }}>
                                <div className="animate-pulse" style={{ color: '#ef4444', fontSize: '16px', fontWeight: 'bold', textShadow: '0 0 8px rgba(0,0,0,0.9), 0 0 16px rgba(0,0,0,0.6)' }}>
                                    ● REC
                                </div>
                            </div>
                            {/* Progress bar + info — bottom center */}
                            {recProgress && (
                                <div style={{ position: 'absolute', bottom: 80, left: '50%', transform: 'translateX(-50%)', textAlign: 'center', background: 'rgba(0,0,0,0.6)', padding: '8px 16px', borderRadius: '8px', backdropFilter: 'blur(4px)' }}>
                                    {recProgress.phase === 'encoding' ? (
                                        <div style={{ color: '#fbbf24', fontSize: '13px', fontFamily: 'monospace' }}>
                                            {recProgress.detail || 'Encoding video...'}
                                        </div>
                                    ) : (
                                        <div style={{ color: '#fff', fontSize: '13px', fontFamily: 'monospace' }}>

                                                        <span className="text-slate-200">{omegaMB.toFixed(2)}</span>
                                                    </div>
                                                    <input type="range" min="0.01" max="1.0" step="0.01" value={omegaMB} onChange={handleOmegaMChangeB} className="w-full accent-amber-500"/>
                                                </div>
                                                <div className={`space-y-1 transition-opacity ${isFlatB ? 'opacity-70' : 'opacity-100'}`}>
                                                    <div className="flex justify-between text-xs">
                                                        <span className="text-slate-400">Dark Energy (&Omega;<sub>&Lambda;</sub>)</span>
                                                        <span className="text-slate-200">{omegaLB.toFixed(2)}</span>
                                                    </div>
                                                    <input type="range" min="0" max={isFlatB ? "0.99" : "1.0"} step="0.01" value={omegaLB} onChange={handleOmegaLChangeB} className={`w-full ${isFlatB ? 'accent-slate-500 cursor-not-allowed' : 'accent-amber-500'}`}/>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    </>)}
                                </div>

                                <div ref={toolsRef} className="space-y-3">
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2 cursor-pointer select-none" onClick={() => setSecTools(!secTools)}>
                                        <ChevronDown size={12} className={`transition-transform duration-200 ${secTools ? '' : '-rotate-90'}`}/> View & Tools
                                    </label>
                                    {secTools && (
                                    <div className="space-y-3 p-3 bg-slate-900/60 rounded border border-white/10 animate-in fade-in duration-200">

                                        {/* VOID ANALYSIS SECTION */}
                                        <div className="pb-3 border-b border-white/5">
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 block">Void Analysis</label>
                                            <div className="flex gap-2 mb-2">
                                                <TooltipWrapper text="Display Voronoi tessellation cells. Low-density cells highlighted." className="flex-1">
                                                    <button
                                                        onClick={() => setShowVoronoi(!showVoronoi)}
                                                        className={`w-full py-2 rounded text-xs flex items-center justify-center gap-1 ${showVoronoi ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                                                    >
                                                        <Grid size={14} /> Voronoi
                                                    </button>
                                                </TooltipWrapper>
                                                <TooltipWrapper text="Voronoi-based watershed void-finding from density minima, similar to the void finder VIDE. Density estimated as 1 / Voronoi cell area. Threshold controls coloring only. Centers are marked by X." className="flex-1">
                                                    <button
                                                        onClick={() => setShowVoids(!showVoids)}
                                                        className={`w-full py-2 rounded text-xs flex items-center justify-center gap-1 ${showVoids ? 'bg-rose-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                                                    >
                                                        <Layers size={14} /> Identification
                                                    </button>
                                                </TooltipWrapper>

                                                {showVoids && (
                                                    <TooltipWrapper text="Stacked radial density profile (Using selected center definition).">
                                                        <button
                                                            onClick={handleShowVoidProfile}
                                                            className={`w-full py-2 rounded text-xs flex items-center justify-center gap-1 ${showVoidProfile ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                                                        >
                                                            <Circle size={14} /> Profile
                                                        </button>
                                                    </TooltipWrapper>
                                                )}
                                            </div>

                                            {showVoids && (
                                                <>
                                                    <div className="space-y-1 mb-2">
                                                        <div className="flex justify-between text-xs">
                                                            <TooltipWrapper text="Cells with density below this threshold (in units of mean density) are classified as void regions and colored by void ID. Higher values include more cells in voids; lower values restrict voids to only the emptiest regions.">
                                                                <span className="text-slate-400 cursor-help border-b border-dotted border-slate-600">Color Cutoff</span>
                                                            </TooltipWrapper>
                                                            <span className="text-slate-200">{voidThreshold.toFixed(2)}× mean density</span>
                                                        </div>
                                                        <input
                                                            type="range"
                                                            min="0.0"
                                                            max="10.0"
                                                            step="0.05"
                                                            value={voidThreshold}
                                                            onChange={e => setVoidThreshold(parseFloat(e.target.value))}
                                                            className="w-full accent-rose-500"
                                                        />
                                                    </div>

                                                    <div className="space-y-1 mb-2">
                                                        <div className="flex justify-between text-xs">
                                                            <span className="text-slate-400">Minimum Radius</span>
                                                            <span className="text-slate-200">{minVoidRadius} Mpc</span>
                                                        </div>
                                                        <input
                                                            type="range"
                                                            min="0"
                                                            max="30"
                                                            step="1"
                                                            value={minVoidRadius}
                                                            onChange={e => setMinVoidRadius(parseInt(e.target.value))}
                                                            className="w-full accent-rose-500"
                                                        />
                                                    </div>
                                                </>
                                            )}

                                            {/* CENTER SELECTION */}
                                            {showVoids && (
                                                <div className="space-y-1">
                                                    <span className="text-xs text-slate-400 block mb-1">Center Definition</span>
                                                    <div className="btn-group">
                                                        <TooltipWrapper text="Geometric center of the void boundary, often leading to slightly higher densities in the innermost regions and may not align with the point of lowest density." className="flex-1">
                                                            <button
                                                                className={voidCenterMode === 'geometric' ? 'active' : ''}
                                                                onClick={() => setVoidCenterMode('geometric')}
                                                            >
                                                                Macrocenter
                                                            </button>
                                                        </TooltipWrapper>
                                                        <TooltipWrapper text="Point of lowest density." className="flex-1">
                                                            <button
                                                                className={voidCenterMode === 'min' ? 'active' : ''}
                                                                onClick={() => setVoidCenterMode('min')}
                                                            >
                                                                Min. Density
                                                            </button>
                                                        </TooltipWrapper>
                                                    </div>
                                                </div>
                                            )}

                                            {/* VOID PROFILE METHOD */}
                                            {showVoids && showVoidProfile && (
                                                <div className="space-y-1 mt-2 border-t border-white/5 pt-2">
                                                    <span className="text-xs text-slate-400 block mb-1">Void Profile Method</span>
                                                    <div className="btn-group">
                                                        <TooltipWrapper text="Median of individual profiles. Best for removing outliers (e.g. contaminated voids)." className="flex-1">
                                                            <button
                                                                className={profileMode === 'median' ? 'active' : ''}
                                                                onClick={() => setProfileMode('median')}
                                                            >
                                                                Median
                                                            </button>
                                                        </TooltipWrapper>
                                                        <TooltipWrapper text="Volume-weighted stacking. Smooth curves, but dominated by largest voids." className="flex-1">
                                                            <button
                                                                className={profileMode === 'stacked' ? 'active' : ''}
                                                                onClick={() => setProfileMode('stacked')}
                                                            >
                                                                Stack
                                                            </button>
                                                        </TooltipWrapper>
                                                    </div>
                                                </div>
                                            )}

                                            {(showVoronoi || showVoids) && isPlaying && (
                                                <p className="text-[10px] text-amber-400 mt-2 italic">⚠ Pause simulation to view Voronoi/Voids</p>
                                            )}
                                        </div>

                                        <div className="grid grid-cols-3 gap-2 pb-2 border-b border-white/5">
                                            <TooltipWrapper text="Overlay original tracer positions at z=10.">
                                                <button onClick={() => setShowInitialOverlay(!showInitialOverlay)} className={`w-full py-2 rounded text-xs flex items-center justify-center gap-1 ${showInitialOverlay ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
                                                    <Clock size={14}/> Start Pos
                                                </button>
                                            </TooltipWrapper>

                                            <TooltipWrapper text="Measure comoving distances. Click start, click end. Double-click near start to clear.">
                                                <button onClick={() => setRulerActive(!rulerActive)} className={`w-full py-2 rounded text-xs flex items-center justify-center gap-1 ${rulerActive ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
                                                    <Ruler size={14}/> Ruler
                                                </button>
                                            </TooltipWrapper>

                                            <TooltipWrapper text="Sculpt Gravity Wells (z=0 only). Click and drag to attract tracers.">
                                                <button
                                                    disabled={cosmicTime < 1.0}
                                                    onClick={() => setSculptActive(!sculptActive)}
                                                    className={`w-full py-2 rounded text-xs flex items-center justify-center gap-1 disabled:opacity-30 disabled:cursor-not-allowed ${sculptActive ? 'bg-purple-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                                                >
                                                    <Hand size={14}/> Sculpt
                                                </button>
                                            </TooltipWrapper>

                                            <TooltipWrapper text={initMode === 'pk'
                                                ? "Computes the 2D power spectrum P(k) of the current tracer distribution using a Cloud-in-Cell density grid. An implementation of Bluestein's FFT allows exact evaluation on non-power-of-2 grids to preserve boundary periodicity. Track the characteristic steepening of the power spectrum as non-linear structures form."
                                                : "Cross-correlation of known BAO centers with CDM tracers. Measures the radial density profile around artificial BAO centers. Probes the idealized BAO signal rather than computing a true 2-point correlation function."
                                            }>
                                                <button
                                                    onClick={handleShowCorrelation}
                                                    className={`w-full py-2 rounded text-xs flex items-center justify-center gap-1 ${showCorrelation ? 'bg-amber-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                                                >
                                                    <TrendingUp size={14}/> {initMode === 'pk' ? 'P(k)' : '2-Pt Corr'}
                                                </button>
                                            </TooltipWrapper>

                                            <TooltipWrapper text="Displays the distribution of the tracer density contrast δ = ρ/ρ̅ − 1, tracking the shift from symmetric linear Gaussian fluctuations to a heavily skewed shape due to non-linear clustering.">
                                                <button
                                                    onClick={handleShowDensityPDF}
                                                    className={`w-full py-2 rounded text-xs flex items-center justify-center gap-1 ${showDensityPDF ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                                                >
                                                    <BarChart2 size={14}/> ρ/ρ̅ Stats
                                                </button>
                                            </TooltipWrapper>

                                            <TooltipWrapper text="Render tracers using a thermal color palette to approximate diffuse gas temperature, mapped to local density. Blue indicates cold, low-density voids, transitioning from white to red for hot, high-density clusters.">
                                                <button
                                                    onClick={() => setShowGas(!showGas)}
                                                    className={`w-full py-2 rounded text-xs flex items-center justify-center gap-1 ${showGas ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}
                                                >
                                                    <Wind size={14}/> Thermal
                                                </button>
                                            </TooltipWrapper>
                                        </div>

                                        <div className="space-y-1 mt-2">
                                            <div className="flex justify-between text-xs">
                                                <span className="text-slate-400">Field of View</span>
                                                <span className="text-slate-200">{boxSizeMpc} Mpc</span>
                                            </div>
                                            <input type="range" min="500" max="3000" step="50" value={boxSizeMpc} onChange={(e) => {
                                                setBoxSizeMpc(parseInt(e.target.value));
                                                handleRestart();
                                            }} className="w-full accent-teal-500"/>
                                        </div>
                                        {initMode === 'bao' && (
                                        <div className="space-y-1">
                                            <div className="flex justify-between text-xs">
                                                <span className="text-slate-400">BAO Rings</span>
                                                <span className="text-slate-200">{numCircles}</span>
                                            </div>
                                            <input type="range" min="1" max="200" step="1" value={numCircles} onChange={(e) => {
                                                setNumCircles(parseInt(e.target.value));
                                                handleRestart();
                                            }} className="w-full accent-teal-500"/>
                                        </div>
                                        )}
                                        <div className="space-y-1">
                                            <div className="flex justify-between text-xs">
                                                <span className="text-slate-400">CDM Tracers</span>
                                                <span className="text-slate-200">{numTracers.toLocaleString()}</span>
                                            </div>
                                            <input type="range" min={Math.log10(20000)} max={Math.ceil(Math.log10(200000) * 100) / 100} step="0.01" value={Math.log10(numTracers)} onChange={(e) => {
                                                let val = Math.round(Math.pow(10, parseFloat(e.target.value)));
                                                const limit = 200000;
                                                if (val > limit) val = limit;
                                                setNumTracers(val);
                                                handleRestart();
                                            }} className="w-full accent-teal-500"/>
                                        </div>

                                        {initMode === 'bao' && (
                                        <div className="mt-3 flex items-center justify-between">
                                            <span className="text-xs text-slate-400">Show BAO density overlay</span>
                                            <label className="toggle-switch scale-75 origin-right">
                                                <input type="checkbox" checked={showDensity} onChange={e => setShowDensity(e.target.checked)}/>
                                                <span className="slider"></span>
                                            </label>
                                        </div>
                                        )}

                                        <div className="mt-3 space-y-1">
                                            <div className="flex justify-between text-xs items-center">
                                                <span className="text-slate-400">Overlay Sample: {trailPercentage}% of {trailMode === 'history' ? 'Past Path' : 'Velocity Vectors'}</span>
                                                <div className="flex items-center gap-1 bg-slate-800 rounded px-1">
                                                    <TooltipWrapper text="Show past trajectory trails.">
                                                        <button
                                                            onClick={() => setTrailMode('history')}
                                                            className={`p-1 rounded ${trailMode === 'history' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}
                                                        >
                                                            <Activity size={10}/>
                                                        </button>
                                                    </TooltipWrapper>
                                                    <TooltipWrapper text="Show current velocity vectors, exaggerated for better visibility.">
                                                        <button
                                                            onClick={() => setTrailMode('vectors')}
                                                            className={`p-1 rounded ${trailMode === 'vectors' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}
                                                        >
                                                            <TrendingUp size={10}/>
                                                        </button>
                                                    </TooltipWrapper>
                                                </div>
                                            </div>
                                            <input type="range" min="0" max="100" step="1" value={trailPercentage} onChange={(e) => setTrailPercentage(parseInt(e.target.value))} className="w-full accent-teal-500"/>
                                        </div>

                                        <div className="mt-3 pt-3 border-t border-white/5 flex items-center gap-2">
                                            <span className="text-xs text-slate-400 whitespace-nowrap">Seed:</span>
                                            <input
                                                type="number"
                                                value={seed}
                                                onChange={(e) => {
                                                    const val = parseInt(e.target.value);
                                                    if (!isNaN(val)) {
                                                        setSeed(val);
                                                        handleRestart();
                                                    }
                                                }}
                                                className="w-16 bg-slate-900 border border-slate-700 text-slate-200 text-xs px-2 py-1 rounded focus:outline-none focus:border-blue-500"
                                            />
                                            <button
                                                onClick={() => {
                                                    setSeed(Math.floor(Math.random() * 99999));
                                                    handleRestart();
                                                }}
                                                className="flex-1 py-1 bg-slate-800 border border-slate-700 rounded text-slate-400 hover:text-white hover:bg-slate-700 text-xs transition-colors flex items-center justify-center"
                                            >
                                                Reshuffle Tracers
                                            </button>
                                        </div>

                                        {/* --- Custom text imprint --- */}
                                        <div className="mt-3 pt-3 border-t border-white/5">
                                            <label className="flex items-center gap-2 cursor-pointer select-none">
                                                <input
                                                    type="checkbox"
                                                    checked={enableCustomText}
                                                    onChange={(e) => {
                                                        setEnableCustomText(e.target.checked);
                                                        handleRestart();
                                                    }}
                                                    className="accent-purple-500 w-3.5 h-3.5"
                                                />
                                                <span className="text-xs text-slate-300 font-medium">Add your own text</span>
                                                <TooltipWrapper text="When enabled, the word you type will be imprinted into the cosmic web: particles near each letter stroke are redirected so that the text appears as dense filaments at z ≈ 0. The effect is invisible at z = 10 and gradually emerges as the Universe evolves. Works in both BAO and Realistic init modes. Restart the simulation after changing the text.">
                                                    <span className="ml-auto text-slate-500 hover:text-slate-300 cursor-help text-xs">ⓘ</span>
                                                </TooltipWrapper>
                                            </label>
                                            {enableCustomText && (
                                                <div className="mt-2 flex gap-2">
                                                    <input
                                                        type="text"
                                                        value={customText}
                                                        placeholder="e.g. COSMOBEST"
                                                        maxLength={16}
                                                        onChange={(e) => setCustomText(e.target.value)}
                                                        onKeyDown={(e) => { if (e.key === 'Enter') handleRestart(); }}
                                                        className="flex-1 bg-slate-900 border border-slate-700 text-slate-200 text-xs px-2 py-1 rounded focus:outline-none focus:border-purple-500 placeholder-slate-600"
                                                    />
                                                    <button
                                                        onClick={handleRestart}
                                                        className="px-2 py-1 bg-purple-700 hover:bg-purple-600 text-white text-xs rounded transition-colors"
                                                    >Apply</button>
                                                </div>
                                            )}
                                        </div>

                                    </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {isSidebarCollapsed && (
                            <div className="flex flex-col items-center gap-6 mt-6 animate-in fade-in duration-300">
                                <button
                                    onClick={handlePlayToggle}
                                    className={`group relative p-2 rounded-full transition-colors ${isPlaying ? 'text-red-400 bg-red-500/10' : 'text-blue-400 hover:bg-white/10'}`}
                                >
                                    {isPlaying ? <Pause size={20} /> : <Play size={20} />}
                                    <span className="absolute left-full top-1/2 -translate-y-1/2 ml-3 px-2 py-1 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none shadow-lg z-50">
                                        {isPlaying ? "Pause Simulation" : "Play Evolution"}
                                    </span>
                                </button>
                                <button
                                    onClick={handleRestart}
                                    className="group relative p-2 text-slate-400 hover:text-white hover:bg-white/10 rounded-full transition-colors"
                                >
                                    <SkipBack size={20} />
                                    <span className="absolute left-full top-1/2 -translate-y-1/2 ml-3 px-2 py-1 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none shadow-lg z-50">
                                        Restart (Return to z=10)
                                    </span>
                                </button>
                                <button
                                    onClick={() => setShowGas(!showGas)}
                                    className={`group relative p-2 rounded-full transition-colors ${showGas ? 'text-cyan-400 bg-cyan-500/10' : 'text-slate-400 hover:bg-white/10'}`}
                                >
                                    <Wind size={20} />
                                    <span className="absolute left-full top-1/2 -translate-y-1/2 ml-3 px-2 py-1 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none shadow-lg z-50">
                                        Toggle Thermal Mode
                                    </span>
                                </button>
                                <button
                                    onClick={() => setShowVoronoi(!showVoronoi)}
                                    className={`group relative p-2 rounded-full transition-colors ${showVoronoi ? 'text-cyan-400 bg-cyan-500/10' : 'text-slate-400 hover:bg-white/10'}`}
                                >
                                    <Grid size={20} />
                                    <span className="absolute left-full top-1/2 -translate-y-1/2 ml-3 px-2 py-1 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none shadow-lg z-50">
                                        Toggle Voronoi
                                    </span>
                                </button>
                                <button
                                    onClick={() => setShowVoids(!showVoids)}
                                    className={`group relative p-2 rounded-full transition-colors ${showVoids ? 'text-rose-400 bg-rose-500/10' : 'text-slate-400 hover:bg-white/10'}`}
                                >
                                    <Layers size={20} />
                                    <span className="absolute left-full top-1/2 -translate-y-1/2 ml-3 px-2 py-1 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none shadow-lg z-50">
                                        Void Identification
                                    </span>
                                </button>
                                {showVoids && (
                                <button
                                    onClick={handleShowVoidProfile}
                                    className={`group relative p-2 rounded-full transition-colors ${showVoidProfile ? 'text-emerald-400 bg-emerald-500/10' : 'text-slate-400 hover:bg-white/10'}`}
                                >
                                    <Circle size={20} />
                                    <span className="absolute left-full top-1/2 -translate-y-1/2 ml-3 px-2 py-1 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none shadow-lg z-50">
                                        Void Profiles
                                    </span>
                                </button>
                                )}
                            </div>
                        )}
                    </div>

                    {/* --- Tutorial Overlay --- */}
                    {tutorialStep > 0 && tutorialSteps[tutorialStep - 1].target.current && (
                        <div className="absolute z-[100] bg-slate-800 border border-blue-500 rounded-lg p-4 shadow-2xl max-w-xs transition-all animate-in fade-in"
                             style={{
                                 top: Math.max(20, tutorialSteps[tutorialStep - 1].target.current.getBoundingClientRect().top),
                                 left: tutorialSteps[tutorialStep - 1].target.current.getBoundingClientRect().right + 20
                             }}>
                            <h3 className="text-blue-400 font-bold mb-1">{tutorialSteps[tutorialStep - 1].title}</h3>
                            <p className="text-sm text-slate-300 mb-3">{tutorialSteps[tutorialStep - 1].content}</p>
                            <div className="flex justify-between items-center">
                                <button onClick={closeTutorial} className="text-xs text-slate-500 hover:text-white">End Tour</button>
                                <button onClick={nextStep} className="text-xs bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-500 transition-colors">
                                    {tutorialStep === tutorialSteps.length ? "Finish" : "Next"}
                                </button>
                            </div>
                        </div>
                    )}

                    {!splitScreen && (
                    <div className="absolute top-8 right-8 pointer-events-none transition-opacity duration-300 z-10 text-right">
                         <div className="bg-black/60 backdrop-blur-md px-4 py-2 rounded-lg border border-white/10 shadow-xl">
                            <span className="text-sm font-bold text-white block">{ageGyr.toFixed(2)} Gyr</span>
                            <span className="text-xl font-bold text-slate-300 font-mono">z = {redshift.toFixed(2)}</span>
                         </div>
                    </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
