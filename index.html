    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const workerCode = `
            importScripts("https://unpkg.com/d3-delaunay@6");

            self.onmessage = function(e) {
                const { physX, physY, N, width, height, showVoids, voidThreshold, minVoidRadiusPx } = e.data;

                if (!physX || N === 0) return;

                const meanSpacing = Math.sqrt(width * height / N);
                const bufferX = Math.min(width * 0.15, meanSpacing * 25);
                const bufferY = Math.min(height * 0.15, meanSpacing * 25);
                const allPoints = [];
                const ghostToReal = new Map();

                // Real particles
                for (let i = 0; i < N; i++) allPoints.push([physX[i], physY[i]]);

                // Ghost particles for periodic boundaries
                for (let i = 0; i < N; i++) {
                    const x = physX[i], y = physY[i];
                    const nearL = x < bufferX, nearR = x > width - bufferX;
                    const nearT = y < bufferY, nearB = y > height - bufferY;
                    if (nearL) { ghostToReal.set(allPoints.length, i); allPoints.push([x + width, y]); }
                    if (nearR) { ghostToReal.set(allPoints.length, i); allPoints.push([x - width, y]); }
                    if (nearT) { ghostToReal.set(allPoints.length, i); allPoints.push([x, y + height]); }
                    if (nearB) { ghostToReal.set(allPoints.length, i); allPoints.push([x, y - height]); }
                    if (nearL && nearT) { ghostToReal.set(allPoints.length, i); allPoints.push([x + width, y + height]); }
                    if (nearL && nearB) { ghostToReal.set(allPoints.length, i); allPoints.push([x + width, y - height]); }
                    if (nearR && nearT) { ghostToReal.set(allPoints.length, i); allPoints.push([x - width, y + height]); }
                    if (nearR && nearB) { ghostToReal.set(allPoints.length, i); allPoints.push([x - width, y - height]); }
                }

                const delaunay = d3.Delaunay.from(allPoints);
                const voronoi = delaunay.voronoi([-bufferX, -bufferY, width + bufferX, height + bufferY]);

                const cellAreas = new Float32Array(N);
                const meanArea = (width * height) / N;

                // Only send polygons if N is manageable (at high N, cells are too small to see)
                const skipPolygons = N > 250000;
                const polygons = [];

                for (let i = 0; i < N; i++) {
                    const cell = voronoi.cellPolygon(i);
                    if (!skipPolygons) polygons.push(cell || []);

                    if (cell) {
                        let area = 0;
                        for (let j = 0; j < cell.length - 1; j++) {
                            area += cell[j][0] * cell[j + 1][1] - cell[j + 1][0] * cell[j][1];
                        }
                        cellAreas[i] = Math.abs(area) / 2;
                    } else {
                        cellAreas[i] = meanArea;
                    }
                }

                const densities = new Float32Array(N);
                for (let i = 0; i < N; i++) densities[i] = meanArea / cellAreas[i];

                let voidResults = null;
                const boundarySegments = [];
                const ghostPolygons = []; // Store ghost cells visible on screen

                if (showVoids) {
                    // --- GHOST CELL EXTRACTION (skip at high N — cells too small to draw) ---
                    if (!skipPolygons) {
                        for (let i = N; i < allPoints.length; i++) {
                            const cell = voronoi.cellPolygon(i);
                            if (!cell) continue;
                            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                            for(const [x,y] of cell) {
                                if(x < minX) minX = x;
                                if(x > maxX) maxX = x;
                                if(y < minY) minY = y;
                                if(y > maxY) maxY = y;
                            }
                            if (maxX >= 0 && minX <= width && maxY >= 0 && minY <= height) {
                                const realI = ghostToReal.get(i);
                                ghostPolygons.push({
                                    poly: cell,
                                    id: realI
                                });
                            }
                        }
                    }

                    const neighbors = Array.from({ length: N }, () => new Set());
                    for (let i = 0; i < N; i++) {
                        for (const j of delaunay.neighbors(i)) {
                            const realJ = j >= N ? ghostToReal.get(j) : j;
                            if (realJ !== undefined && realJ < N && realJ !== i) {
                                neighbors[i].add(realJ);
                                neighbors[realJ].add(i);
                            }
                        }
                    }

                    // --- VOID FINDING ---
                    const isLocalMinimum = new Array(N).fill(false);
                    for (let i = 0; i < N; i++) {
                        let isMin = true;
                        for (const neighborIdx of neighbors[i]) {
                            if (densities[neighborIdx] <= densities[i]) {
                                isMin = false;
                                break;
                            }
                        }
                        isLocalMinimum[i] = isMin;
                    }

                    const allCells = [];
                    for (let i = 0; i < N; i++) {
                        allCells.push({ index: i, density: densities[i] });
                    }
                    allCells.sort((a, b) => a.density - b.density);

                    const voidIDs = new Int32Array(N).fill(-1);
                    let currentVoidID = 0;

                    for (let i = 0; i < N; i++) {
                        if (isLocalMinimum[i]) {
                            currentVoidID++;
                            voidIDs[i] = currentVoidID;
                        }
                    }

                    for (const { index: cellIdx } of allCells) {
                        if (voidIDs[cellIdx] !== -1) continue;
                        let bestNeighbor = -1;
                        let bestNeighborDensity = Infinity;
                        for (const neighborIdx of neighbors[cellIdx]) {
                            if (voidIDs[neighborIdx] !== -1 && densities[neighborIdx] < bestNeighborDensity) {
                                bestNeighborDensity = densities[neighborIdx];
                                bestNeighbor = neighborIdx;
                            }
                        }
                        if (bestNeighbor !== -1 && densities[bestNeighbor] <= densities[cellIdx]) {
                            voidIDs[cellIdx] = voidIDs[bestNeighbor];
                        }
                    }

                    // BFS second pass: propagate into remaining unassigned cells
                    // (handles equal-density plateaus missed by single-pass watershed)
                    const frontier = [];
                    for (let i = 0; i < N; i++) {
                        if (voidIDs[i] !== -1) {
                            for (const nIdx of neighbors[i]) {
                                if (voidIDs[nIdx] === -1) { frontier.push(i); break; }
                            }
                        }
                    }
                    let fi = 0;
                    while (fi < frontier.length) {
                        const src = frontier[fi++];
                        const vid = voidIDs[src];
                        for (const nIdx of neighbors[src]) {
                            if (voidIDs[nIdx] === -1) {
                                voidIDs[nIdx] = vid;
                                frontier.push(nIdx);
                            }
                        }
                    }

                    // --- MERGING ---
                    const parent = new Int32Array(currentVoidID + 1);
                    for(let i=0; i<=currentVoidID; i++) parent[i] = i;

                    const find = (i) => {
                        while (i !== parent[i]) {
                            parent[i] = parent[parent[i]];
                            i = parent[i];
                        }
                        return i;
                    };

                    const union = (i, j) => {
                        const rootI = find(i);
                        const rootJ = find(j);
                        if (rootI !== rootJ) parent[rootI] = rootJ;
                    };

                    // VOID MERGING PARAMETERS (see void-worker.js for detailed explanations):
                    const wallDensityThreshold = 1.0;
                    const minAbsoluteHoleSize = 3.;
                    const minRelativeHoleSize = 0.2;

                    const edgeStats = new Map();

                    for (let i = 0; i < N; i++) {
                        const idA = voidIDs[i];
                        if (idA === -1) continue;

                        for (const nIdx of neighbors[i]) {
                            const idB = voidIDs[nIdx];
                            if (idB !== -1 && idB !== idA && i < nIdx) {
                                const minID = idA < idB ? idA : idB;
                                const maxID = idA > idB ? idA : idB;
                                const key = minID + "_" + maxID;

                                if (!edgeStats.has(key)) edgeStats.set(key, { open: 0, total: 0 });
                                const stats = edgeStats.get(key);

                                stats.total++;
                                if (densities[i] < wallDensityThreshold && densities[nIdx] < wallDensityThreshold) {
                                    stats.open++;
                                }
                            }
                        }
                    }

                    for (const [key, stats] of edgeStats) {
                        if (stats.open > minAbsoluteHoleSize && (stats.open / stats.total) > minRelativeHoleSize) {
                            const [sA, sB] = key.split('_');
                            union(parseInt(sA), parseInt(sB));
                        }
                    }

                    if (minVoidRadiusPx > 0) {
                        let iterations = 0;
                        let somethingMerged = true;

                        while (somethingMerged && iterations < 50) {
                            somethingMerged = false;
                            iterations++;

                            const rootAreas = new Float32Array(currentVoidID + 1).fill(0);
                            for (let i = 0; i < N; i++) {
                                if (voidIDs[i] !== -1) {
                                    rootAreas[find(voidIDs[i])] += cellAreas[i];
                                }
                            }

                            const isSmall = new Int8Array(currentVoidID + 1).fill(0);
                            let smallCount = 0;
                            for (let i = 1; i <= currentVoidID; i++) {
                                if (parent[i] === i) {
                                    const radius = Math.sqrt(rootAreas[i] / Math.PI);
                                    if (radius < minVoidRadiusPx) {
                                        isSmall[i] = 1;
                                        smallCount++;
                                    }
                                }
                            }

                            if (smallCount === 0) break;

                            const smallVoidAdjacency = new Map();

                            for (let i = 0; i < N; i++) {
                                const id = voidIDs[i];
                                if (id === -1) continue;
                                const root = find(id);

                                if (isSmall[root] === 1) {
                                    if (!smallVoidAdjacency.has(root)) smallVoidAdjacency.set(root, new Map());
                                    const neighborsMap = smallVoidAdjacency.get(root);

                                    for (const nIdx of neighbors[i]) {
                                        const nId = voidIDs[nIdx];
                                        if (nId !== -1) {
                                            const nRoot = find(nId);
                                            if (nRoot !== root) {
                                                neighborsMap.set(nRoot, (neighborsMap.get(nRoot) || 0) + 1);
                                            }
                                        }
                                    }
                                }
                            }

                            for (const [root, neighborsMap] of smallVoidAdjacency) {
                                let bestNeighbor = -1;
                                let maxEdges = -1;
                                for (const [nRoot, count] of neighborsMap) {
                                    if (count > maxEdges) {
                                        maxEdges = count;
                                        bestNeighbor = nRoot;
                                    }
                                }
                                if (bestNeighbor !== -1) {
                                    const rootA = find(root);
                                    const rootB = find(bestNeighbor);
                                    if (rootA !== rootB) {
                                        union(rootA, rootB);
                                        somethingMerged = true;
                                    }
                                }
                            }
                        }
                    }

                    const mapping = new Int32Array(currentVoidID + 1).fill(-1);
                    let nextID = 0;
                    for(let i=1; i<=currentVoidID; i++) {
                        const root = find(i);
                        if (mapping[root] === -1) {
                            nextID++;
                            mapping[root] = nextID;
                        }
                        mapping[i] = mapping[root];
                    }

                    for(let i=0; i<N; i++) {
                        if(voidIDs[i] !== -1) voidIDs[i] = mapping[voidIDs[i]];
                    }

                    // --- GENERATE BOUNDARY OUTLINES ---
                    const { halfedges, triangles } = delaunay;

                    const getVoidID = (idx) => {
                        if (idx < N) return voidIDs[idx];
                        const real = ghostToReal.get(idx);
                        return (real !== undefined) ? voidIDs[real] : -1;
                    };

                    const getDensity = (idx) => {
                        if (idx < N) return densities[idx];
                        const real = ghostToReal.get(idx);
                        return (real !== undefined) ? densities[real] : Infinity;
                    }

                    for(let i = 0; i < halfedges.length; i++) {
                        const j = halfedges[i];
                        if (j < i) continue;

                        const pA = triangles[i];
                        const pB = triangles[j];

                        const vA = getVoidID(pA);
                        const vB = getVoidID(pB);

                        const dA = getDensity(pA);
                        const dB = getDensity(pB);

                        let isBoundary = false;
                        if (vA !== vB) {
                            // Always show boundaries between different void IDs
                            // regardless of density threshold (Color Cutoff)
                            const validA = (vA !== -1);
                            const validB = (vB !== -1);
                            if (validA || validB) isBoundary = true;
                        }

                        if (isBoundary) {
                            const tA = Math.floor(i / 3);
                            const tB = Math.floor(j / 3);

                            const x1 = voronoi.circumcenters[tA * 2];
                            const y1 = voronoi.circumcenters[tA * 2 + 1];
                            const x2 = voronoi.circumcenters[tB * 2];
                            const y2 = voronoi.circumcenters[tB * 2 + 1];

                            if (Math.abs(x1 - x2) < width/2 && Math.abs(y1 - y2) < height/2) {
                                boundarySegments.push(x1, y1, x2, y2);
                            }
                        }
                    }

                    // --- PBC-AWARE CENTER CALCULATIONS ---
                    const k = (2 * Math.PI) / width;
                    const ky = (2 * Math.PI) / height;

                    const sumSinX = new Float32Array(nextID + 1);
                    const sumCosX = new Float32Array(nextID + 1);
                    const sumSinY = new Float32Array(nextID + 1);
                    const sumCosY = new Float32Array(nextID + 1);
                    const voidAreas = new Float32Array(nextID + 1);

                    const minDensities = new Float32Array(nextID + 1).fill(Infinity);
                    const voidMinCenters = new Float32Array((nextID + 1) * 2);

                    for (let i = 0; i < N; i++) {
                        const vid = voidIDs[i];
                        if (vid > 0) {
                            const a = cellAreas[i];
                            voidAreas[vid] += a;

                            const thetaX = physX[i] * k;
                            const thetaY = physY[i] * ky;

                            sumSinX[vid] += Math.sin(thetaX) * a;
                            sumCosX[vid] += Math.cos(thetaX) * a;
                            sumSinY[vid] += Math.sin(thetaY) * a;
                            sumCosY[vid] += Math.cos(thetaY) * a;

                            if (densities[i] < minDensities[vid]) {
                                minDensities[vid] = densities[i];
                                voidMinCenters[vid*2] = physX[i];
                                voidMinCenters[vid*2+1] = physY[i];
                            }
                        }
                    }

                    const voidCentroids = new Float32Array((nextID + 1) * 2);
                    const voidRadii = new Float32Array(nextID + 1);

                    for (let i = 1; i <= nextID; i++) {
                        if (voidAreas[i] > 0) {
                            let avgThetaX = Math.atan2(sumSinX[i], sumCosX[i]);
                            let avgThetaY = Math.atan2(sumSinY[i], sumCosY[i]);

                            if (avgThetaX < 0) avgThetaX += 2 * Math.PI;
                            if (avgThetaY < 0) avgThetaY += 2 * Math.PI;

                            voidCentroids[i*2] = avgThetaX / k;
                            voidCentroids[i*2+1] = avgThetaY / ky;

                            voidRadii[i] = Math.sqrt(voidAreas[i] / Math.PI);
                        }
                    }

                    voidResults = { voidIDs, numVoids: nextID, voidCentroids, voidMinCenters, voidRadii };
                }

                self.postMessage({ polygons, densities, voidResults, boundarySegments, ghostPolygons });
            };
        `;

        const App = () => {
            const [numCircles, setNumCircles] = useState(25);
            const [numTracers, setNumTracers] = useState(50000);
            const [boxSizeMpc, setBoxSizeMpc] = useState(1000);
            const [initMode, setInitMode] = useState('bao');  // 'bao' or 'pk'

            // Cosmology State
            const [cosmoMode, setCosmoMode] = useState('LCDM');
            const [omegaM, setOmegaM] = useState(DEFAULT_OM);
            const [omegaL, setOmegaL] = useState(DEFAULT_OL);
            const [w0, setW0] = useState(DEFAULT_W0);
            const [wa, setWa] = useState(DEFAULT_WA);
            const [isFlat, setIsFlat] = useState(true);

            // --- Split-Screen Comparison Mode ---
            const [splitScreen, setSplitScreen] = useState(false);
            // Panel B cosmology state (Panel A uses the main cosmology state above)
            const [cosmoModeB, setCosmoModeB] = useState('LCDM');
            const [omegaMB, setOmegaMB] = useState(DEFAULT_OM);
            const [omegaLB, setOmegaLB] = useState(DEFAULT_OL);
            const [w0B, setW0B] = useState(DEFAULT_W0);
            const [waB, setWaB] = useState(DEFAULT_WA);

            const cosmologyLUT = useMemo(() => {
                return generateCosmologyLUT(omegaM, omegaL, w0, wa);
            }, [omegaM, omegaL, w0, wa]);

            const cosmologyLUTB = useMemo(() => {
                if (!splitScreen) return null;

            }, [splitScreen, omegaMB, omegaLB, w0B, waB]);

            const [cosmicTime, setCosmicTime] = useState(cosmologyLUT.minTime);
            const [showTracers, setShowTracers] = useState(true);
            const [showGas, setShowGas] = useState(false);
            const [showDensity, setShowDensity] = useState(false);
            const [showInitialOverlay, setShowInitialOverlay] = useState(false);
            const [rulerActive, setRulerActive] = useState(false);
            const [sculptActive, setSculptActive] = useState(false);
            const [trailPercentage, setTrailPercentage] = useState(0);
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [enableLocalGravity, setEnableLocalGravity] = useState(true);
            const [useAdhesion, setUseAdhesion] = useState(true);
            const [isPlaying, setIsPlaying] = useState(false);
            const [seed, setSeed] = useState(42);
            const [enableCustomText, setEnableCustomText] = useState(false);
            const [customText, setCustomText] = useState('');
            const SIDEBAR_W = 64; // collapsed sidebar width (w-16)
            const [canvasSize, setCanvasSize] = useState({ w: window.innerWidth - SIDEBAR_W, h: window.innerHeight });
            const [renderTrigger, setRenderTrigger] = useState(0);

            const [showCorrelation, setShowCorrelation] = useState(false);

            const [showDensityPDF, setShowDensityPDF] = useState(false);
            const [trailMode, setTrailMode] = useState('history');
            const [showVoronoi, setShowVoronoi] = useState(false);
            const [showVoids, setShowVoids] = useState(false);
            const [voidThreshold, setVoidThreshold] = useState(2.0);
            const [minVoidRadius, setMinVoidRadius] = useState(10);
            const [voidCenterMode, setVoidCenterMode] = useState('geometric');
            const [profileMode, setProfileMode] = useState('median');

            // --- Collapsible sidebar sections ---
            const [secEvolution, setSecEvolution] = useState(true);
            const [secCosmology, setSecCosmology] = useState(true);
            const [secTools, setSecTools] = useState(true);

            // --- Tutorial State & Refs ---
            const [tutorialStep, setTutorialStep] = useState(0);
            const playBtnRef = useRef(null);
            const cosmoRef = useRef(null);
            const toolsRef = useRef(null);

            // --- Simulation Time Step ---
            const [simDeltaT, setSimDeltaT] = useState(0.002);

            // --- Video Recording State ---
            const [isRecording, setIsRecording] = useState(false);
            const [recordResolution, setRecordResolution] = useState('window'); // 'window', '720p', '1080p'
            const [recProgress, setRecProgress] = useState(null); // { current, total, z, ageGyr } or null
            const recorderRef = useRef(null);         // SimulationRecorder instance
            const isRecordingRef = useRef(false);     // ref flag for render loop

            const tutorialSteps = [
                { target: playBtnRef, title: "Time & Evolution", content: "Move through time using only linear theory, or hit Play to enable non-linear N-body gravity for more accurate physics on small scales." },
                { target: cosmoRef, title: "Build Your Universe", content: "Change the dark matter and dark energy ratios, as well as cosmological models. Watch how it alters the final structures in the cosmic web." },
                { target: toolsRef, title: "Analyze the Web", content: "Find voids, measure the power spectrum, and render the temperature of the gas." }
            ];

            const closeTutorial = () => setTutorialStep(0);
            const nextStep = () => {
                if (tutorialStep === tutorialSteps.length) setTutorialStep(0);
                else setTutorialStep(s => s + 1);
            };

            useEffect(() => {
                // Try external file first; fall back to inline blob for file:// protocol
                let worker;
                try {
                    worker = new Worker('workers/void-worker.js');
                    // Test if the worker actually loaded by adding an error handler
                    worker.onerror = (err) => {
                        console.warn('[VoidWorker] External file failed, falling back to inline blob', err);
                        worker.terminate();
                        const blob = new Blob([workerCode], { type: 'application/javascript' });
                        const url = URL.createObjectURL(blob);
                        const fallback = new Worker(url);
                        workerRef.current = fallback;
                        fallback.onmessage = (e) => {
                            voronoiDataRef.current = e.data;
                            isWorkerBusy.current = false;
                        };
                    };
                } catch (e) {
                    // Direct fallback
                    const blob = new Blob([workerCode], { type: 'application/javascript' });
                    const url = URL.createObjectURL(blob);
                    worker = new Worker(url);
                }
                workerRef.current = worker;

                worker.onmessage = (e) => {
                    voronoiDataRef.current = e.data;
                    isWorkerBusy.current = false;
                };

                return () => {
                    if (workerRef.current) workerRef.current.terminate();
                };
            }, []);

            // --- Initialize Panel B Void Worker ---
            useEffect(() => {
                let workerB;
                try {
                    workerB = new Worker('workers/void-worker.js');
                    workerB.onerror = () => {
                        workerB.terminate();
                        const blob = new Blob([workerCode], { type: 'application/javascript' });
                        const url = URL.createObjectURL(blob);
                        workerRefB.current = new Worker(url);
                        workerRefB.current.onmessage = (e) => { voronoiDataRefB.current = e.data; isWorkerBusyB.current = false; };
                    };
                } catch (e) {
                    const blob = new Blob([workerCode], { type: 'application/javascript' });
                    const url = URL.createObjectURL(blob);
                    workerB = new Worker(url);
                }
                workerRefB.current = workerB;
                workerB.onmessage = (e) => { voronoiDataRefB.current = e.data; isWorkerBusyB.current = false; };
                return () => { if (workerRefB.current) workerRefB.current.terminate(); };
            }, []);

            // --- Initialize WebGPU Gravity ---
            useEffect(() => {
                if (typeof GPUGravityCompute === 'undefined') {
                    console.log('[GPUGravity] GPUGravityCompute class not loaded');
                    return;
                }
                const gpu = new GPUGravityCompute();
                gpu.init().then(async (ok) => {
                    if (ok) {
                        gpuGravityRef.current = gpu;
                        setGpuAvailable(true);
                        gpuHardwareAvailable.current = true;
                        setUseGPU(true);
                        console.log('[GPUGravity] Ready');
                        // Initialize GPU correlation, sharing the same WebGPU device
                        if (typeof GPUCorrelationCompute !== 'undefined') {
                            const corr = new GPUCorrelationCompute();
                            const corrOk = await corr.init(gpu.device);
                            if (corrOk) {
                                gpuCorrelationRef.current = corr;
                                console.log('[GPUCorrelation] Ready (shared device)');
                            }
                        }
                    } else {
                        console.log('[GPUGravity] Not available, using CPU fallback');
                    }
                });
                return () => {
                    if (gpuCorrelationRef.current) {
                        gpuCorrelationRef.current.destroy();
                        gpuCorrelationRef.current = null;
                    }
                    if (gpuGravityRef.current) {
                        gpuGravityRef.current.destroy();
                        gpuGravityRef.current = null;
                    }
                };
            }, []);


            useEffect(() => {
                voronoiDataRef.current = null;
            }, [minVoidRadius, showVoids]);

            const lastCalcParamsRef = useRef({ minVoidRadius: 10, voidThreshold: 1.0 });

            useEffect(() => {
                if (simulationTimeRef.current < cosmologyLUT.minTime) {
                    simulationTimeRef.current = cosmologyLUT.minTime;
                    setCosmicTime(cosmologyLUT.minTime);
                }
            }, [cosmologyLUT]);

            const headRef = useRef(new Int32Array(0));
            const nextRef = useRef(new Int32Array(0));
            const posRef = useRef({ x: new Float32Array(0), y: new Float32Array(0), size: 0 });

            const localDynamics = useRef({
                offsets: new Float32Array(0),
                velocities: new Float32Array(0),
                densities: new Float32Array(0),
                smoothedDensities: new Float32Array(0),
                crossingAccum: new Float32Array(0), // ADHESION: Track crossing accumulator
                initialized: false
            });
            const trailHistory = useRef([]);

            // --- Panel B physics state (split-screen) ---
            const headRefB = useRef(new Int32Array(0));
            const nextRefB = useRef(new Int32Array(0));
            const posRefB = useRef({ x: new Float32Array(0), y: new Float32Array(0), size: 0 });

            const localDynamicsB = useRef({
                offsets: new Float32Array(0),
                velocities: new Float32Array(0),
                densities: new Float32Array(0),
                smoothedDensities: new Float32Array(0),
                crossingAccum: new Float32Array(0),
                initialized: false
            });
            const trailHistoryB = useRef([]);
            const voronoiDataRefB = useRef(null);
            const workerRefB = useRef(null);
            const isWorkerBusyB = useRef(false);
            const lastCalcParamsRefB = useRef({ minVoidRadius: 10, voidThreshold: 1.0 });

            // Arrays for WebGL data transfer (avoids reallocation)
            const webglDataRef = useRef({
                colors: new Float32Array(0),
                sizes: new Float32Array(0),
                positions: new Float32Array(0)
            });

            const { z: redshift, D: growthD } = useMemo(() => {
                return getValuesAtTime(cosmicTime, cosmologyLUT);
            }, [cosmicTime, cosmologyLUT]);

            const ageGyr = useMemo(() => calculateAgeGyr(redshift, omegaM, omegaL, w0, wa), [redshift, omegaM, omegaL, w0, wa]);

            // E&H Eq. 26 sound horizon fitting formula (Mpc)
            // Matches the BAO oscillation scale in the E&H transfer function
            // Ω_b = 0.157 × Ω_m (Planck baryon fraction)
            const BAO_RADIUS_MPC = useMemo(() => {
                const om = Math.max(0.01, omegaM);
                const omhh = om * PLANCK_H * PLANCK_H;
                const obhh = om * PLANCK_FB * PLANCK_H * PLANCK_H;
                return 44.5 * Math.log(9.83 / omhh) / Math.sqrt(1.0 + 10.0 * Math.pow(obhh, 0.75));
            }, [omegaM]);

            const BAO_RADIUS_MPC_B = useMemo(() => {
                const om = Math.max(0.01, omegaMB);
                const omhh = om * PLANCK_H * PLANCK_H;
                const obhh = om * PLANCK_FB * PLANCK_H * PLANCK_H;
                return 44.5 * Math.log(9.83 / omhh) / Math.sqrt(1.0 + 10.0 * Math.pow(obhh, 0.75));
            }, [omegaMB]);

            const DIVIDER_WIDTH = 4;
            const panelW = splitScreen ? Math.floor((canvasSize.w - DIVIDER_WIDTH) / 2) : canvasSize.w;
            const SIM_W = panelW;
            const SIM_H = canvasSize.h;
            const tracersPerPanel = splitScreen ? Math.ceil(numTracers / 2) : numTracers;
            const pxPerMpc = canvasSize.w / boxSizeMpc; // FoV refers to full screen width
            const panelBoxMpc = SIM_W / pxPerMpc;       // physical Mpc across one panel
            const BAO_RADIUS_PX = BAO_RADIUS_MPC * pxPerMpc;
            const BAO_RADIUS_PX_B = BAO_RADIUS_MPC_B * pxPerMpc;
            const INTERACTION_RADIUS = Math.max(SIM_W, SIM_H) * 0.8;
            const INTERACTION_RADIUS_SQ = INTERACTION_RADIUS * INTERACTION_RADIUS;

            // Initialize WebGL — Panel A (re-runs when splitScreen toggles because canvas may remount)
            useEffect(() => {
                const canvas = webglCanvasRef.current;
                if (!canvas) return;
                const result = setupPanelWebGL(canvas);
                if (result) {
                    glRef.current = result.gl;
                    programRef.current = result.program;
                    buffersRef.current = result.buffers;
                }
            }, [splitScreen]);

            // Initialize WebGL — Panel B (only when split-screen is on)
            useEffect(() => {
                if (!splitScreen) {
                    glRefB.current = null;
                    programRefB.current = null;
                    buffersRefB.current = { position: null, color: null, size: null };
                    return;
                }
                const canvas = webglCanvasRefB.current;
                if (!canvas) return;
                const result = setupPanelWebGL(canvas);
                if (result) {
                    glRefB.current = result.gl;
                    programRefB.current = result.program;
                    buffersRefB.current = result.buffers;
                }
            }, [splitScreen]);

            // Handle Canvas Resize for WebGL
            useEffect(() => {
                // Panel A
                const gl = glRef.current;
                const canvas = webglCanvasRef.current;
                if (gl && canvas && programRef.current) {
                    gl.viewport(0, 0, canvas.width, canvas.height);
                    const resLoc = gl.getUniformLocation(programRef.current, "u_resolution");
                    gl.uniform2f(resLoc, canvas.width, canvas.height);
                }
                // Panel B
                const glB = glRefB.current;
                const canvasB = webglCanvasRefB.current;
                if (glB && canvasB && programRefB.current) {
                    glB.viewport(0, 0, canvasB.width, canvasB.height);
                    const resLoc = glB.getUniformLocation(programRefB.current, "u_resolution");
                    glB.uniform2f(resLoc, canvasB.width, canvasB.height);
                }
            }, [canvasSize, splitScreen]);

            const centers = useMemo(() => {
                const rng = (s) => {
                    let h = 0xdeadbeef;
                    return () => { h = Math.imul(h ^ s, 0x85ebca6b); h ^= h >>> 13; h = Math.imul(h, 0xc2b2ae35); h ^= h >>> 16; return (h >>> 0) / 4294967296; }
                };
                const rand = rng(seed * 7331 + boxSizeMpc);
                const list = [];
                if (numCircles > 0) {
                    list.push({ x: SIM_W/2, y: SIM_H/2 });
                    for(let i=1; i<numCircles; i++) list.push({ x: rand()*SIM_W, y: rand()*SIM_H });
                }
                return list;
            }, [numCircles, seed, SIM_W, SIM_H, boxSizeMpc]);

            const initialTracers = useMemo(() => {
                const rng = (s) => {
                    let h = 0x12345678;
                    return () => { h = Math.imul(h ^ s, 0x85ebca6b); h ^= h >>> 13; h = Math.imul(h, 0xc2b2ae35); h ^= h >>> 16; return (h >>> 0) / 4294967296; }
                };
                const rand = rng(seed * 7331 + boxSizeMpc + 1);
                const list = [];

                for(let i=0; i<tracersPerPanel; i++) {
                    const noiseAngle = rand() * Math.PI * 2;
                    const noiseMag = rand();
                    list.push({
                        qx: rand() * SIM_W,
                        qy: rand() * SIM_H,
                        id: i,
                        noiseX: Math.cos(noiseAngle) * noiseMag,
                        noiseY: Math.sin(noiseAngle) * noiseMag
                    });
                }

                localDynamics.current = {
                    offsets: new Float32Array(tracersPerPanel * 2),
                    velocities: new Float32Array(tracersPerPanel * 2),
                    gravityForces: new Float32Array(tracersPerPanel * 2),
                    prevGravForces: new Float32Array(tracersPerPanel * 2),
                    densities: new Float32Array(tracersPerPanel),
                    smoothedDensities: new Float32Array(tracersPerPanel),
                    crossingAccum: new Float32Array(tracersPerPanel),
                    thermalPhases: initThermalPhases(tracersPerPanel, seed),
                    initialized: true
                };

                if (posRef.current.size !== tracersPerPanel) {
                    posRef.current = {
                        x: new Float32Array(tracersPerPanel),
                        y: new Float32Array(tracersPerPanel),
                        size: tracersPerPanel
                    };
                }

                // Initialize WebGL transfer arrays size
                webglDataRef.current = {
                    colors: new Float32Array(tracersPerPanel * 4),
                    sizes: new Float32Array(tracersPerPanel),
                    positions: new Float32Array(tracersPerPanel * 2)
                };

                trailHistory.current = [];
                for(let k=0; k<tracersPerPanel; k++) {
                    trailHistory.current.push({ id: k, path: [] });
                }

                // --- Initialize Panel B physics state (same arrays, independent dynamics) ---
                localDynamicsB.current = {
                    offsets: new Float32Array(tracersPerPanel * 2),
                    velocities: new Float32Array(tracersPerPanel * 2),
                    gravityForces: new Float32Array(tracersPerPanel * 2),
                    prevGravForces: new Float32Array(tracersPerPanel * 2),
                    densities: new Float32Array(tracersPerPanel),
                    smoothedDensities: new Float32Array(tracersPerPanel),
                    crossingAccum: new Float32Array(tracersPerPanel),
                    thermalPhases: initThermalPhases(tracersPerPanel, seed + 9999),
                    initialized: true
                };
                if (posRefB.current.size !== tracersPerPanel) {
                    posRefB.current = {
                        x: new Float32Array(tracersPerPanel),
                        y: new Float32Array(tracersPerPanel),
                        size: tracersPerPanel
                    };
                }
                if (headRefB.current.length === 0) headRefB.current = new Int32Array(0);
                if (nextRefB.current.length === 0) nextRefB.current = new Int32Array(0);
                trailHistoryB.current = [];
                for(let k=0; k<tracersPerPanel; k++) {
                    trailHistoryB.current.push({ id: k, path: [] });
                }

                // --- Panel B WebGL data arrays ---
                webglDataRefB.current = {
                    colors: new Float32Array(tracersPerPanel * 4),
                    sizes: new Float32Array(tracersPerPanel),
                    positions: new Float32Array(tracersPerPanel * 2)
                };

                return list;
            }, [seed, SIM_W, SIM_H, tracersPerPanel, boxSizeMpc]);

            // --- Custom text SDF: built only when the feature is enabled ---
            // Renders the user's text onto a hidden canvas at simulation resolution,
            // then builds a coarse nearest-stroke lookup table (SDF) so that
            // tracerForces can hard-snap nearby particles to letter strokes.
            const _cosmoTextKick = useMemo(() => {
                if (!enableCustomText || !customText.trim()) return null;
                try {
                    const mc = document.createElement('canvas');
                    mc.width  = SIM_W;
                    mc.height = SIM_H;
                    const mctx = mc.getContext('2d');
                    mctx.fillStyle = '#000';
                    mctx.fillRect(0, 0, SIM_W, SIM_H);
                    const fs = Math.round(SIM_H * 0.22);
                    mctx.font = `400 ${fs}px Arial, sans-serif`;
                    mctx.textAlign    = 'center';
                    mctx.textBaseline = 'middle';
                    mctx.fillStyle    = '#fff';
                    mctx.fillText(customText.trim(), SIM_W / 2, SIM_H / 2);
                    const imgData = mctx.getImageData(0, 0, SIM_W, SIM_H).data;

                    // Build a coarse SDF: for each 4-px cell store the nearest
                    // stroke pixel within snapR.  O(nStroke * snapR/cellSz) build.
                    const snapR  = SIM_H * 0.025;
                    const cellSz = 4;
                    const gcw    = Math.ceil(SIM_W / cellSz);
                    const gch    = Math.ceil(SIM_H / cellSz);
                    const nearX  = new Int16Array(gcw * gch).fill(-1);
                    const nearY  = new Int16Array(gcw * gch).fill(-1);
                    const nearD2 = new Float32Array(gcw * gch).fill(Infinity);

                    // Collect stroke pixels (subsample every 2 px for speed)
                    const strokePx = [], strokePy = [];
                    for (let sy = 0; sy < SIM_H; sy += 2)
                        for (let sx = 0; sx < SIM_W; sx += 2)
                            if (imgData[(sy * SIM_W + sx) * 4] > 128) {
                                strokePx.push(sx); strokePy.push(sy);
                            }

                    if (strokePx.length === 0) return null; // text rendered outside canvas

                    // For each stroke pixel, update the SDF cells within snapR
                    for (let k = 0; k < strokePx.length; k++) {
                        const sx = strokePx[k], sy = strokePy[k];
                        const x0 = Math.max(0,       Math.floor((sx - snapR) / cellSz));
                        const x1 = Math.min(gcw - 1, Math.ceil ((sx + snapR) / cellSz));
                        const y0 = Math.max(0,       Math.floor((sy - snapR) / cellSz));
                        const y1 = Math.min(gch - 1, Math.ceil ((sy + snapR) / cellSz));
                        for (let cy = y0; cy <= y1; cy++) {
                            for (let cx = x0; cx <= x1; cx++) {
                                const pcx = cx * cellSz + cellSz / 2;
                                const pcy = cy * cellSz + cellSz / 2;
                                const d2  = (sx - pcx) ** 2 + (sy - pcy) ** 2;
                                const gi  = cy * gcw + cx;
                                if (d2 < nearD2[gi]) {
                                    nearD2[gi] = d2;
                                    nearX[gi]  = sx;
                                    nearY[gi]  = sy;
                                }
                            }
                        }
                    }
                    return { snapR, cellSz, gcw, gch, nearX, nearY };
                } catch(e) {
                    console.error('[CustomText] SDF build failed:', e);
                    return null;
                }
            }, [enableCustomText, customText, SIM_W, SIM_H]);

            // Helper: apply the text imprint onto a pre-computed displacement array.
            // Particles whose Lagrangian position (qx, qy) falls within snapR of a
            // letter stroke have their displacement hard-replaced with the vector
            // pointing directly to that stroke pixel.  The returned Uint8Array marks
            // which particles were snapped (used to suppress 2LPT scatter).
            const applyTextImprint = (forces, kick) => {
                if (!kick) return null;
                const { snapR, cellSz, gcw, gch, nearX, nearY } = kick;
                const snapped = new Uint8Array(tracersPerPanel);
                for (let i = 0; i < tracersPerPanel; i++) {
                    const g   = initialTracers[i];
                    const gcx = Math.min(gcw - 1, Math.floor(g.qx / cellSz));
                    const gcy = Math.min(gch - 1, Math.floor(g.qy / cellSz));
                    const gi  = gcy * gcw + gcx;
                    const nx  = nearX[gi];
                    const ny  = nearY[gi];
                    if (nx < 0) continue;
                    const dx = nx - g.qx, dy = ny - g.qy;
                    if (dx * dx + dy * dy < snapR * snapR) {
                        forces[i * 2]     = dx;
                        forces[i * 2 + 1] = dy;
                        snapped[i] = 1;
                    }
                }
                return snapped;
            };

            const tracerForces = useMemo(() => {
                const forces = initMode === 'pk'
                    ? generatePkDisplacements(initialTracers, tracersPerPanel, SIM_W, SIM_H, omegaM, panelBoxMpc, seed)
                    : computeTracerForces(initialTracers, centers, BAO_RADIUS_PX, tracersPerPanel, SIM_W, SIM_H, seed, omegaM, panelBoxMpc);
                forces._cosmoSnapped = applyTextImprint(forces, _cosmoTextKick);
                return forces;
            }, [initialTracers, centers, BAO_RADIUS_PX, tracersPerPanel, SIM_W, SIM_H, seed, omegaM, initMode, panelBoxMpc, _cosmoTextKick]);

            const tracerForcesB = useMemo(() => {
                if (!splitScreen) return tracerForces;
                const forces = initMode === 'pk'
                    ? generatePkDisplacements(initialTracers, tracersPerPanel, SIM_W, SIM_H, omegaMB, panelBoxMpc, seed)
                    : computeTracerForces(initialTracers, centers, BAO_RADIUS_PX_B, tracersPerPanel, SIM_W, SIM_H, seed, omegaMB, panelBoxMpc);
                applyTextImprint(forces, _cosmoTextKick);
                return forces;
            }, [splitScreen, initialTracers, centers, BAO_RADIUS_PX_B, tracersPerPanel, SIM_W, SIM_H, seed, tracerForces, omegaMB, initMode, panelBoxMpc, _cosmoTextKick]);

            // 2LPT correction displacement computed from 1LPT via FFT.
            // For particles snapped to letter strokes the 2LPT scatter would blur
            // the text; we zero their correction to keep the strokes sharp.
            const tracerForces2 = useMemo(() => {
                const f2 = compute2LPTDisplacement(tracerForces, initialTracers, tracersPerPanel, SIM_W, SIM_H);
                const snapped = tracerForces._cosmoSnapped;
                if (snapped) {
                    for (let i = 0; i < tracersPerPanel; i++)
                        if (snapped[i]) { f2[i * 2] = 0; f2[i * 2 + 1] = 0; }
                }
                return f2;
            }, [tracerForces, initialTracers, tracersPerPanel, SIM_W, SIM_H]);

            const tracerForces2B = useMemo(() => {
                if (!splitScreen) return tracerForces2;
                return compute2LPTDisplacement(tracerForcesB, initialTracers, tracersPerPanel, SIM_W, SIM_H);
            }, [splitScreen, tracerForcesB, initialTracers, tracersPerPanel, SIM_W, SIM_H, tracerForces2]);

            const resetPhysics = () => {
                localDynamics.current.offsets.fill(0);
                localDynamics.current.velocities.fill(0);
                localDynamics.current.gravityForces.fill(0);
                if (localDynamics.current.prevGravForces) localDynamics.current.prevGravForces.fill(0);
                localDynamics.current.densities.fill(0);
                // Snap smoothedDensities to 0 (will be overwritten on next render)
                // so gas view doesn't show stale data from a previous run
                if (localDynamics.current.smoothedDensities) localDynamics.current.smoothedDensities.fill(0);
                if (localDynamics.current.crossingAccum) localDynamics.current.crossingAccum.fill(0);
                voronoiDataRef.current = null;
                if (trailHistory.current) {
                    for(let i=0; i<trailHistory.current.length; i++) {
                        trailHistory.current[i].path = [];
                    }
                }
            };

            const resetPhysicsB = () => {
                localDynamicsB.current.offsets.fill(0);
                localDynamicsB.current.velocities.fill(0);
                localDynamicsB.current.gravityForces.fill(0);
                if (localDynamicsB.current.prevGravForces) localDynamicsB.current.prevGravForces.fill(0);
                localDynamicsB.current.densities.fill(0);
                if (localDynamicsB.current.smoothedDensities) localDynamicsB.current.smoothedDensities.fill(0);
                if (localDynamicsB.current.crossingAccum) localDynamicsB.current.crossingAccum.fill(0);
                voronoiDataRefB.current = null;
                if (trailHistoryB.current) {
                    for(let i=0; i<trailHistoryB.current.length; i++) {
                        trailHistoryB.current[i].path = [];
                    }
                }
            };

            const resetVoidAnalysis = () => {
                setShowVoronoi(false);
                setShowVoids(false);
                setShowVoidProfile(false);
                setVoidThreshold(2.0);
                setMinVoidRadius(10);
                voronoiDataRef.current = null;
                voronoiDataRefB.current = null;
            };

            const handlePlayToggle = () => {
                const minT = cosmologyLUT.minTime;
                if (!isPlaying && cosmicTime >= 1.0) {
                    simulationTimeRef.current = minT;
                    setCosmicTime(minT);
                    resetPhysics();
                    if (splitScreen) resetPhysicsB();
                    setRenderTrigger(t => t + 1);
                    return;
                }
                setIsPlaying(!isPlaying);
            };

            const handleRestart = () => {
                const minT = cosmologyLUT.minTime;
                simulationTimeRef.current = minT;
                setCosmicTime(minT);
                setIsPlaying(false);
                resetPhysics();
                if (splitScreen) resetPhysicsB();
                resetVoidAnalysis();
                setRenderTrigger(t => t + 1);
            };

            const handleTimeSliderChange = (e) => {
                const t = parseFloat(e.target.value);
                simulationTimeRef.current = t;
                setCosmicTime(t);
                setIsPlaying(false);
                if (localDynamics.current.initialized) resetPhysics();
                if (splitScreen && localDynamicsB.current.initialized) resetPhysicsB();
                resetVoidAnalysis();
                setRenderTrigger(tr => tr + 1);
            };

            const handleOmegaMChange = (e) => {
                const val = parseFloat(e.target.value);
                setOmegaM(val);
                if (isFlat) setOmegaL(parseFloat((1 - val).toFixed(2)));
                handleRestart();
            };
            const handleOmegaLChange = (e) => {
                const val = parseFloat(e.target.value);
                setOmegaL(val);
                if (isFlat) setOmegaM(parseFloat((1 - val).toFixed(2)));
                handleRestart();
            };
            const toggleFlat = () => {
                const newFlat = !isFlat;
                setIsFlat(newFlat);
                if (newFlat) setOmegaL(parseFloat((1 - omegaM).toFixed(2)));
                handleRestart();
            };
            const handleCosmoModeChange = (mode) => {
                setCosmoMode(mode);
                if (mode === 'LCDM') { setW0(-1.0); setWa(0.0); }
                else if (mode === 'wCDM') { setWa(0.0); }
                handleRestart();
            };
            const handleW0Change = (e) => { setW0(parseFloat(e.target.value)); handleRestart(); };
            const handleWaChange = (e) => { setWa(parseFloat(e.target.value)); handleRestart(); };

            // --- Panel B cosmology handlers (only reset Panel B, not Panel A) ---
            const handleRestartB = () => {
                resetPhysicsB();
                voronoiDataRefB.current = null;
                setRenderTrigger(t => t + 1);
            };
            const handleOmegaMChangeB = (e) => {
                const val = parseFloat(e.target.value);
                setOmegaMB(val);
                if (isFlatB) setOmegaLB(parseFloat((1 - val).toFixed(2)));
                handleRestartB();
            };
            const handleOmegaLChangeB = (e) => {
                const val = parseFloat(e.target.value);
                setOmegaLB(val);
                if (isFlatB) setOmegaMB(parseFloat((1 - val).toFixed(2)));
                handleRestartB();
            };
            const toggleFlatB = () => {
                const newFlat = !isFlatB;
                setIsFlatB(newFlat);
                if (newFlat) setOmegaLB(parseFloat((1 - omegaMB).toFixed(2)));
                handleRestartB();
            };
            const handleCosmoModeChangeB = (mode) => {
                setCosmoModeB(mode);
                if (mode === 'LCDM') { setW0B(-1.0); setWaB(0.0); }
                else if (mode === 'wCDM') { setWaB(0.0); }
                handleRestartB();
            };
            const handleW0ChangeB = (e) => { setW0B(parseFloat(e.target.value)); handleRestartB(); };
            const handleWaChangeB = (e) => { setWaB(parseFloat(e.target.value)); handleRestartB(); };

            const takeScreenshot = () => {
                // Combine canvases (both panels in split-screen)
                const glCanvas = webglCanvasRef.current;
                const uiCanvas = uiCanvasRef.current;
                if(glCanvas && uiCanvas) {
                    const totalW = splitScreen ? (SIM_W * 2 + DIVIDER_WIDTH) : SIM_W;
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = totalW;
                    tempCanvas.height = SIM_H;
                    const tCtx = tempCanvas.getContext('2d');

                    // Draw black background
                    tCtx.fillStyle = '#000000';
                    tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

                    // Draw Panel A
                    tCtx.drawImage(glCanvas, 0, 0);
                    tCtx.drawImage(uiCanvas, 0, 0);

                    // Draw Panel B (if split-screen)
                    if (splitScreen && webglCanvasRefB.current && uiCanvasRefB.current) {
                        const bx = SIM_W + DIVIDER_WIDTH;
                        // Divider
                        tCtx.fillStyle = 'rgba(255,255,255,0.35)';
                        tCtx.fillRect(SIM_W, 0, DIVIDER_WIDTH, SIM_H);
                        tCtx.drawImage(webglCanvasRefB.current, bx, 0);
                        tCtx.drawImage(uiCanvasRefB.current, bx, 0);
                    }

                    // Draw HUD info box
                    const hudX = tempCanvas.width - 180;
                    const hudY = 32;
                    const hudW = 150;
                    const hudH = 58;
                    tCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    tCtx.fillRect(hudX, hudY, hudW, hudH);
                    tCtx.strokeStyle = 'rgba(255,255,255,0.1)';
                    tCtx.strokeRect(hudX, hudY, hudW, hudH);
                    tCtx.textAlign = 'right';
                    tCtx.fillStyle = '#ffffff';
                    tCtx.font = 'bold 14px Inter, sans-serif';
                    tCtx.fillText(`${ageGyr.toFixed(2)} Gyr`, hudX + hudW - 10, hudY + 22);
                    tCtx.fillStyle = '#cbd5e1';
                    tCtx.font = 'bold 20px monospace';
                    tCtx.fillText(`z = ${redshift.toFixed(2)}`, hudX + hudW - 10, hudY + 46);

                    // Link text bottom-right
                    // Link text bottom-right with rounded box
                    const linkText = 'nicosmo.github.io/cosmic_web_explorer';
                    const linkFontSize = 22;
                    tCtx.font = `300 ${linkFontSize}px Inter, sans-serif`;
                    tCtx.textAlign = 'right';
                    tCtx.textBaseline = 'middle';

                    const linkMetrics = tCtx.measureText(linkText);
                    const linkWidth = linkMetrics.width;
                    const linkPadX = 12;
                    const linkPadY = 8;
                    const linkBoxW = linkWidth + linkPadX * 2;
                    const linkBoxH = linkFontSize + linkPadY * 2;

                    const linkBoxX = tempCanvas.width - linkBoxW - 20;
                    const linkBoxY = tempCanvas.height - linkBoxH - 20;
                    const linkRadius = 8;

                    // Draw semi-transparent box
                    tCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    tCtx.beginPath();
                    tCtx.moveTo(linkBoxX + linkRadius, linkBoxY);
                    tCtx.arcTo(linkBoxX + linkBoxW, linkBoxY, linkBoxX + linkBoxW, linkBoxY + linkBoxH, linkRadius);
                    tCtx.arcTo(linkBoxX + linkBoxW, linkBoxY + linkBoxH, linkBoxX, linkBoxY + linkBoxH, linkRadius);
                    tCtx.arcTo(linkBoxX, linkBoxY + linkBoxH, linkBoxX, linkBoxY, linkRadius);
                    tCtx.arcTo(linkBoxX, linkBoxY, linkBoxX + linkBoxW, linkBoxY, linkRadius);
                    tCtx.closePath();
                    tCtx.fill();

                    // Draw subtle border matching HUD
                    tCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    tCtx.lineWidth = 1;
                    tCtx.stroke();

                    // Draw text
                    tCtx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                    tCtx.fillText(linkText, tempCanvas.width - 20 - linkPadX, linkBoxY + (linkBoxH / 2));

                    const link = document.createElement('a');
                    const screenshotPrefix = initMode === 'bao' ? 'BAO_LSS' : 'LSS';
                    link.download = `${screenshotPrefix}_visualization_z${redshift.toFixed(2)}.png`;
                    link.href = tempCanvas.toDataURL();
                    link.click();
                }
            };

            // --- DATA EXPORT (CSV) ---
            const exportPanelCSV = (pos, panelLabel, pOmegaM, pOmegaL, pW0, pWa, pGrowthD, pBaoMpc) => {
                if (!pos || !pos.x || pos.x.length === 0) return;
                const N = tracersPerPanel;
                const h = PLANCK_H;
                const omB = pOmegaM * PLANCK_FB;
                const ns = PLANCK_NS;
                const sigma8 = PLANCK_SIGMA8;
                const scaleFactor = 1 / (1 + redshift);
                const boxXMpc = SIM_W / pxPerMpc;
                const boxYMpc = SIM_H / pxPerMpc;
                const boxXMpcH = boxXMpc * h;
                const boxYMpcH = boxYMpc * h;

                const lines = [];
                lines.push(`# Cosmic Web Explorer — Tracer positions${panelLabel ? ' (Panel ' + panelLabel + ')' : ''}`);
                lines.push(`# init_mode = ${initMode === 'pk' ? 'Realistic (E&H P(k))' : 'BAO (idealized rings)'}`);
                lines.push(`# N_tracers = ${N}`);
                lines.push(`# seed = ${seed}`);
                lines.push(`# h = ${h}`);
                lines.push(`# Omega_m = ${pOmegaM}`);
                lines.push(`# Omega_L = ${pOmegaL}`);
                lines.push(`# Omega_b = ${omB.toFixed(6)}`);
                lines.push(`# w0 = ${pW0}`);
                lines.push(`# wa = ${pWa}`);
                lines.push(`# n_s = ${ns}`);
                lines.push(`# sigma_8 = ${sigma8}`);
                lines.push(`# redshift = ${redshift.toFixed(4)}`);
                lines.push(`# scale_factor = ${scaleFactor.toFixed(6)}`);
                lines.push(`# growth_factor_D1 = ${pGrowthD.toFixed(6)}`);
                lines.push(`# box_x = ${boxXMpc.toFixed(2)} Mpc  (${boxXMpcH.toFixed(2)} Mpc/h)`);
                lines.push(`# box_y = ${boxYMpc.toFixed(2)} Mpc  (${boxYMpcH.toFixed(2)} Mpc/h)`);
                lines.push(`# units = Mpc/h (comoving)`);
                lines.push(`# boundary = periodic`);
                if (initMode === 'bao') {
                    lines.push(`# N_baoRings = ${numCircles}`);
                    lines.push(`# bao_scale = ${pBaoMpc.toFixed(2)} Mpc`);
                }
                lines.push('# x_Mpc/h, y_Mpc/h');

                for (let i = 0; i < N; i++) {
                    const xMpcH = (pos.x[i] / pxPerMpc) * h;
                    const yMpcH = ((SIM_H - pos.y[i]) / pxPerMpc) * h;  // flip y: bottom-left origin
                    lines.push(`${xMpcH.toFixed(4)}, ${yMpcH.toFixed(4)}`);
                }

                const csv = lines.join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                const panelSuffix = panelLabel ? `_panel${panelLabel}` : '';
                const csvPrefix = initMode === 'bao' ? 'BAO_LSS' : 'LSS';
                link.download = `${csvPrefix}_tracers_z${redshift.toFixed(2)}${panelSuffix}.csv`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            };

            const handleDataExport = () => {
                if (splitScreen) {
                    // Panel B growth factor at the same redshift through its own cosmology
                    const resultB = getValuesAtRedshift(redshift, cosmologyLUTB);
                    const growthDB = resultB ? resultB.D : growthD;
                    exportPanelCSV(posRef.current, 'A', omegaM, omegaL, w0, wa, growthD, BAO_RADIUS_MPC);
                    // Small delay so the browser doesn't block the second download
                    setTimeout(() => {
                        exportPanelCSV(posRefB.current, 'B', omegaMB, omegaLB, w0B, waB, growthDB, BAO_RADIUS_MPC_B);
                    }, 200);
                } else {
                    exportPanelCSV(posRef.current, '', omegaM, omegaL, w0, wa, growthD, BAO_RADIUS_MPC);
                }
            };

            // --- VIDEO RECORDING ---
            // Pure JS WebM encoder (no MediaRecorder). gl.readPixels -> WebP -> VP8 -> EBML.
            // Deterministic frame count: holdStart + simSteps + holdEnd at 30fps.
            // Records from current z (window res) or z=10 (720p/1080p — regenerates ICs).
            // Stop saves partial video with 3s hold at the stopped z.

            const getSpeedLabel = () => {
                if (simDeltaT === 0.004) return 'Fast';
                if (simDeltaT === 0.002) return 'Normal';
                if (simDeltaT === 0.001) return 'Smooth';
                if (simDeltaT === 0.0005) return 'HQ';
                if (simDeltaT === 0.00025) return 'Ultra-HQ';
                return `dt${simDeltaT.toString().replace('.', '')}`;
            };

            const startRecording = () => {
                // Stop playback if running
                if (isPlaying) setIsPlaying(false);

                const currentT = simulationTimeRef.current;
                const speedLabel = getSpeedLabel();
                const gasLabel = showGas ? '_Gas' : '';

                // Mark recording active so render loop won't self-schedule
                isRecordingRef.current = true;
                recStopRequestedRef.current = false;
                setIsRecording(true);

                // Determine recording resolution
                if (recordResolution === '720p' || recordResolution === '1080p') {
                    const recW = recordResolution === '720p' ? 1280 : 1920;
                    const recH = recordResolution === '720p' ? 720 : 1080;
                    // Save current canvas size for restoration
                    savedCanvasSizeRef.current = { w: canvasSize.w, h: canvasSize.h };
                    // Set pending — will be picked up after canvas resize regenerates ICs
                    pendingRecRef.current = { speedLabel, gasLabel };
                    // Canvas resize triggers IC regeneration -> record from z=10
                    setCanvasSize({ w: recW, h: recH });
                } else {
                    // Window resolution — record from current z
                    actualStartRecording(currentT, speedLabel, gasLabel);
                }
            };

            const actualStartRecording = (startTime, speedLabel, gasLabel = '') => {
                const glCanvas = webglCanvasRef.current;
                const uiCanvas = uiCanvasRef.current;
                if (!glCanvas || !uiCanvas) { finishRecording(speedLabel, gasLabel, 10, 0); return; }

                // In split-screen, the recording canvas is the full width (both panels + divider)
                let recW, recH;
                if (splitScreen) {
                    recW = glCanvas.width * 2 + DIVIDER_WIDTH;
                    recH = glCanvas.height;
                } else {
                    recW = glCanvas.width;
                    recH = glCanvas.height;
                }

                const rec = new window.SimulationRecorder();
                if (!rec.init(recW, recH, numTracers)) { finishRecording(speedLabel, gasLabel, 10, 0); return; }
                recorderRef.current = rec;

                const totalSteps = Math.ceil((1.0 - startTime) / simDeltaT);
                const holdStartFrames = 30;  // 1 second at 30fps
                const holdEndFrames   = 90;  // 3 seconds at 30fps
                const totalFrames = holdStartFrames + totalSteps + holdEndFrames;

                const { z: startZ } = getValuesAtTime(startTime, cosmologyLUT);
                const startAge = calculateAgeGyr(startZ, omegaM, omegaL, w0, wa);
                setRecProgress({ current: 0, total: totalFrames, z: startZ, ageGyr: startAge });

                setTimeout(() => {
                    runRecordingLoop(startTime, totalSteps, holdStartFrames, holdEndFrames, totalFrames, speedLabel, gasLabel);
                }, 250);
            };

            const runRecordingLoop = async (startTime, totalSteps, holdStartFrames, holdEndFrames, totalFrames, speedLabel, gasLabel = '') => {
                const gl = glRef.current;
                const glCanvas = webglCanvasRef.current;
                const uiCanvas = uiCanvasRef.current;
                const rec = recorderRef.current;

                if (!recRenderFnRef.current || !gl || !glCanvas || !uiCanvas || !rec) {
                    console.error('[Recording] Missing refs, aborting');
                    finishRecording(speedLabel, gasLabel, 10, 0);
                    return;
                }

                let frameIdx = 0;

                const getHudInfo = () => {
                    const { z } = getValuesAtTime(simulationTimeRef.current, cosmologyLUT);
                    const ageGyr = calculateAgeGyr(z, omegaM, omegaL, w0, wa);
                    return { z, ageGyr };
                };

                const updateProgress = (total) => {
                    const hi = getHudInfo();
                    setRecProgress({ current: frameIdx, total, z: hi.z, ageGyr: hi.ageGyr });
                };

                const renderAndCapture = async () => {
                    // Always read the LATEST render function from the ref.
                    // The render useEffect re-runs on state changes (sidebar toggle, etc.),
                    // which sets cancelled=true on the old closure. Reading from the ref
                    // ensures we always call the current, non-cancelled render function.
                    const currentRenderFn = recRenderFnRef.current;
                    if (currentRenderFn) await currentRenderFn();
                    gl.finish();
                    // In split-screen, also finish Panel B's GL and pass both canvases
                    const glB = glRefB.current;
                    if (splitScreen && glB) glB.finish();
                    const glCanvasB = splitScreen ? webglCanvasRefB.current : null;
                    const uiCanvasB = splitScreen ? uiCanvasRefB.current : null;
                    await rec.captureFrame(glCanvas, uiCanvas, getHudInfo(), glCanvasB, uiCanvasB, DIVIDER_WIDTH);
                };

                try {
                // --- Warm up gas densities so recording doesn't start dark ---
                // smoothedDensities starts at 0 after resetPhysics(). Run a few render
                // passes without capturing to compute actual densities, then snap.
                simulationTimeRef.current = startTime;
                setCosmicTime(startTime);
                for (let warmup = 0; warmup < 3; warmup++) {
                    const currentRenderFn = recRenderFnRef.current;
                    if (currentRenderFn) await currentRenderFn();
                    await new Promise(r => setTimeout(r, 0));
                }
                // Snap smoothedDensities to actual densities so gas view is correct from frame 1
                const ld = localDynamics.current;
                if (ld && ld.smoothedDensities && ld.densities) {
                    ld.smoothedDensities.set(ld.densities);
                }
                if (splitScreen) {
                    const ldB = localDynamicsB.current;
                    if (ldB && ldB.smoothedDensities && ldB.densities) {
                        ldB.smoothedDensities.set(ldB.densities);
                    }
                }

                // --- Initial render at starting z ---
                await renderAndCapture();
                frameIdx++;

                // --- Hold start frame (1s) using duplicate frames (no re-encode) ---
                for (let h = 1; h < holdStartFrames; h++) {
                    rec.pushDuplicateFrame();
                    frameIdx++;
                    if (h % 10 === 0) updateProgress(totalFrames);
                }
                // Yield after hold
                await new Promise(r => setTimeout(r, 0));

                // --- Simulation frames ---
                for (let step = 0; step < totalSteps; step++) {
                    if (recStopRequestedRef.current) break;

                    let nextT = startTime + (step + 1) * simDeltaT;
                    if (nextT > 1.0) nextT = 1.0;
                    simulationTimeRef.current = nextT;

                    await renderAndCapture();
                    frameIdx++;

                    // Update slider + progress
                    if (step % 3 === 0) setCosmicTime(nextT);
                    if (step % 5 === 0) updateProgress(totalFrames);
                }

                // --- Hold final frame (3s) — always runs, even after manual stop ---
                const actualTotal = frameIdx + holdEndFrames;
                // Capture one real frame at current z for the hold
                await renderAndCapture();
                frameIdx++;
                for (let h = 1; h < holdEndFrames; h++) {
                    rec.pushDuplicateFrame();
                    frameIdx++;
                    if (h % 10 === 0) {
                        const hi = getHudInfo();
                        setRecProgress({ current: frameIdx, total: actualTotal, z: hi.z, ageGyr: hi.ageGyr });
                    }
                }
                // Yield
                await new Promise(r => setTimeout(r, 0));

                } catch (e) {
                    console.error('[Recording] Error during recording loop:', e);
                }

                // Compute final z for filename
                const { z: endZ } = getValuesAtTime(simulationTimeRef.current, cosmologyLUT);
                const { z: sZ } = getValuesAtTime(startTime, cosmologyLUT);
                finishRecording(speedLabel, gasLabel, sZ, endZ);
            };

            const finishRecording = async (speedLabel, gasLabel = '', startZ = 10, endZ = 0) => {
                const rec = recorderRef.current;
                isRecordingRef.current = false;
                recStopRequestedRef.current = false;

                if (rec) {
                    try {
                        const res = recordResolution === 'window'
                            ? `${rec.width}x${rec.height}` : recordResolution;
                        const zRange = `z${startZ.toFixed(1)}-${endZ.toFixed(1)}`;
                        const splitLabel = splitScreen ? '_compare' : '';
                        const videoPrefix = initMode === 'bao' ? 'BAO_LSS' : 'LSS';
                        const fname = `${videoPrefix}_visualization_${res}_${speedLabel}_${zRange}${gasLabel}${splitLabel}.${rec.fileExtension}`;
                        await rec.stop(fname, (progress) => {
                            setRecProgress((prev) => ({ ...prev, phase: progress.phase, detail: progress.detail }));
                        });
                    } catch (e) {
                        console.error('[Recording] Error during stop/save:', e);
                        rec.cleanup();
                    }
                }
                recorderRef.current = null;

                // Restore canvas size if changed for 720p/1080p
                const saved = savedCanvasSizeRef.current;
                if (saved) {
                    savedCanvasSizeRef.current = null;
                    setCanvasSize(saved);
                }

                // Reset to z=10
                const minT = cosmologyLUT.minTime;
                simulationTimeRef.current = minT;
                setCosmicTime(minT);
                resetPhysics();
                if (splitScreen) resetPhysicsB();

                setIsRecording(false);
                setRecProgress(null);
                setRenderTrigger(t => t + 1);
            };

            const stopRecording = () => {
                // If still pending (canvas resize in progress), cancel
                if (pendingRecRef.current) {
                    pendingRecRef.current = null;
                    isRecordingRef.current = false;
                    setIsRecording(false);
                    setRecProgress(null);
                    const saved = savedCanvasSizeRef.current;
                    if (saved) { savedCanvasSizeRef.current = null; setCanvasSize(saved); }
                    setRenderTrigger(t => t + 1);
                    return;
                }
                // Signal the loop to stop sim frames -> loop adds 3s hold -> saves
                recStopRequestedRef.current = true;
            };

            const handleRecordToggle = () => {
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            };

            const handleMouseDown = (e) => {
                const rect = document.getElementById('app-container').getBoundingClientRect();
                const x = e.clientX - rect.left - SIDEBAR_W;
                const y = e.clientY - rect.top;
                if (sculptActive) {
                    rulerRef.current.isSculpting = true;
                    rulerRef.current.mouse = {x, y};
                    return;
                }
                if(!rulerActive) return;
                if (!rulerRef.current.start) {
                    rulerRef.current.start = {x, y};
                    rulerRef.current.current = {x, y};
                } else {
                    const dx = x - rulerRef.current.start.x;
                    const dy = y - rulerRef.current.start.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 5) {
                        rulerRef.current.start = null;
                        rulerRef.current.current = null;
                    } else {
                        rulerRef.current.start = {x, y};
                        rulerRef.current.current = {x, y};
                    }
                }
            };
            const handleMouseMove = (e) => {
                const rect = document.getElementById('app-container').getBoundingClientRect();
                const x = e.clientX - rect.left - SIDEBAR_W;
                const y = e.clientY - rect.top;
                if (sculptActive && rulerRef.current.isSculpting) {
                    rulerRef.current.mouse = {x, y};
                    return;
                }
                if(!rulerActive || !rulerRef.current.start) return;
